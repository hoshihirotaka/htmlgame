<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>コヨーテ 1対1アレンジ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #fff0f5;
      --bg2: #e9f8ff;
      --ink: #5d3850;
      --panel: rgba(255,255,255,0.82);
      --pink: #ff8fc2;
      --blue: #8fd8ff;
      --ok: #66cfa0;
      --bad: #ef7fa2;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: "M PLUS Rounded 1c", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .app {
      width: min(100vw, 640px);
      height: 100vh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)) 10px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr auto;
      gap: 8px;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #fff;
      border-radius: 14px;
      padding: 8px 10px;
    }
    .cutin {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #fff;
      background: rgba(36, 22, 32, 0.38);
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      text-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }
    .cutin.show { opacity: 1; transform: scale(1); }
    .cutin.you { background: rgba(255, 143, 194, 0.42); }
    .cutin.npc { background: rgba(143, 216, 255, 0.42); }
    .cutin.open { background: rgba(165, 118, 204, 0.42); }
    .cutin.win { background: rgba(102, 207, 160, 0.45); }
    .cutin.lose { background: rgba(239, 127, 162, 0.45); }
    .title { font-size: 18px; font-weight: 800; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip {
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 4px 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .zone-title { font-size: 12px; font-weight: 800; margin-bottom: 4px; }
    .cards { display: flex; gap: 6px; }
    .card {
      width: 78px;
      height: 108px;
      border-radius: 12px;
      border: 2px solid #fff;
      background: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 800;
      font-size: 22px;
      line-height: 1.2;
      color: var(--ink);
      box-shadow: 0 2px 0 rgba(120,85,105,0.18);
      padding: 6px;
    }
    .card.back {
      background: linear-gradient(145deg, #ffd7ea, #d8f1ff);
      color: #7f5f73;
      font-size: 13px;
    }
    .card.special { font-size: 17px; }
    .reveal-grid { display: flex; gap: 6px; flex-wrap: wrap; }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 6px;
      align-items: center;
    }
    .sum-box {
      border-radius: 12px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.92);
      padding: 6px 8px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
    }
    .sum-col { text-align: center; }
    .sum-box .label { font-size: 12px; font-weight: 800; color: #7a6376; }
    .sum-box .value { font-size: 34px; font-weight: 800; line-height: 1; color: var(--ink); }
    .sum-comp {
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 800;
      color: #8e6f82;
      min-width: 28px;
    }
    input[type="number"] {
      width: 100%;
      min-width: 0;
      border: 2px solid #fff;
      border-radius: 10px;
      padding: 9px;
      font: inherit;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      font: inherit;
      font-weight: 800;
      background: var(--pink);
      box-shadow: 0 3px 0 rgba(120,70,97,0.25);
    }
    button.secondary { background: var(--blue); }
    button.success { background: var(--ok); }
    button:disabled { opacity: 0.45; }

    .msg { min-height: 36px; font-size: 13px; font-weight: 700; line-height: 1.35; }
    .opened-title { font-size: 12px; font-weight: 800; margin-bottom: 4px; color: #7f687a; }
    .opened-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; min-height: 24px; }
    .open-chip {
      border-radius: 999px;
      padding: 2px 8px;
      background: rgba(255,255,255,0.94);
      border: 1px solid #fff;
      font-size: 11px;
      font-weight: 800;
      color: #7d5f73;
    }
    .history { font-size: 12px; font-weight: 700; color: #886f82; max-height: 110px; overflow: auto; }
    .line { padding: 2px 0; border-bottom: 1px dashed rgba(130, 104, 121, 0.25); }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="title">コヨーテ 1対1アレンジ（あなた vs NPC）</div>
      <div class="row">
        <div class="chip" id="roundInfo">ラウンド: 1 / 4</div>
        <div class="chip" id="deckInfo">山札残り: 18</div>
        <div class="chip" id="turnInfo">手番: あなた</div>
        <div class="chip" id="bidInfo">現在宣言: なし</div>
      </div>
    </div>

    <div class="panel row" id="scoreRow"></div>

    <div class="panel board">
      <div>
        <div class="zone-title">NPCのカード（あなたには見える）</div>
        <div class="cards" id="npcCards"></div>
      </div>
      <div>
        <div class="zone-title">あなたのカード（あなたには見えない）</div>
        <div class="cards" id="playerCards"></div>
      </div>
    </div>

    <div class="panel">
      <div class="sum-box">
        <div class="sum-col">
          <div class="label">宣言数</div>
          <div class="value" id="bidValue">--</div>
        </div>
        <div class="sum-comp" id="cmpValue">-</div>
        <div class="sum-col">
          <div class="label">実合計</div>
          <div class="value" id="sumValue">--</div>
        </div>
      </div>
      <div class="actions">
        <input id="bidInput" type="number" placeholder="宣言値を入力" />
        <button id="declareBtn">宣言</button>
        <button class="secondary" id="overBtn">オーバー</button>
        <button class="success" id="nextBtn" disabled>次ラウンド</button>
      </div>
    </div>

    <div class="panel">
      <div class="msg" id="message"></div>
      <div class="zone-title" style="margin-top:6px;">公開結果</div>
      <div class="reveal-grid" id="reveal"></div>
    </div>

    <div class="panel">
      <div class="opened-title">公開されたカード一覧</div>
      <div class="opened-list" id="openedList"></div>
      <div class="history" id="history"></div>
    </div>
  </div>
  <div class="cutin" id="cutin"></div>

  <script>
    (() => {
      const state = {
        deck: [],
        round: 1,
        totalRounds: 4,
        hands: [[], []],
        scores: [0, 0],
        starter: 0,
        turn: 0,
        currentBid: null,
        currentBidBy: null,
        phase: "bidding",
        gameOver: false,
        lastTotal: null,
        openedCards: [],
        cutinActive: false,
      };

      const el = {
        roundInfo: document.getElementById("roundInfo"),
        deckInfo: document.getElementById("deckInfo"),
        turnInfo: document.getElementById("turnInfo"),
        bidInfo: document.getElementById("bidInfo"),
        sumValue: document.getElementById("sumValue"),
        bidValue: document.getElementById("bidValue"),
        cmpValue: document.getElementById("cmpValue"),
        scoreRow: document.getElementById("scoreRow"),
        npcCards: document.getElementById("npcCards"),
        playerCards: document.getElementById("playerCards"),
        bidInput: document.getElementById("bidInput"),
        declareBtn: document.getElementById("declareBtn"),
        overBtn: document.getElementById("overBtn"),
        nextBtn: document.getElementById("nextBtn"),
        message: document.getElementById("message"),
        reveal: document.getElementById("reveal"),
        openedList: document.getElementById("openedList"),
        history: document.getElementById("history"),
        cutin: document.getElementById("cutin"),
      };

      function log(line) {
        const div = document.createElement("div");
        div.className = "line";
        div.textContent = line;
        el.history.prepend(div);
      }

      function setMessage(text, tone) {
        el.message.textContent = text;
        if (tone === "ok") el.message.style.color = "var(--ok)";
        else if (tone === "bad") el.message.style.color = "var(--bad)";
        else el.message.style.color = "var(--ink)";
      }

      function showCutin(text, tone, ms = 700) {
        return new Promise((resolve) => {
          state.cutinActive = true;
          el.cutin.textContent = text;
          el.cutin.className = "cutin " + (tone || "") + " show";
          render();
          setTimeout(() => {
            el.cutin.className = "cutin " + (tone || "");
            setTimeout(() => {
              state.cutinActive = false;
              render();
              resolve();
            }, 140);
          }, ms);
        });
      }

      function createDeck() {
        const cards = [];
        for (let n = 1; n <= 10; n += 1) cards.push({ type: "num", label: String(n), value: n, point: n });
        for (let n = -1; n >= -4; n -= 1) cards.push({ type: "num", label: String(n), value: n, point: n });
        cards.push({ type: "max0", label: "MAX 0", value: 0, point: 0 });
        cards.push({ type: "max0", label: "MAX 0", value: 0, point: 0 });
        cards.push({ type: "x2", label: "×2", value: 0, point: 0 });
        cards.push({ type: "x2", label: "×2", value: 0, point: 0 });

        for (let i = cards.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = cards[i]; cards[i] = cards[j]; cards[j] = t;
        }
        return cards;
      }

      function drawCard() {
        return state.deck.pop();
      }

      function dealRound() {
        state.hands = [[], []];
        for (let i = 0; i < 2; i += 1) {
          state.hands[0].push(drawCard());
          state.hands[1].push(drawCard());
        }
        state.turn = state.starter;
        state.currentBid = null;
        state.currentBidBy = null;
        state.lastTotal = null;
        state.phase = "bidding";
        el.bidInput.value = "";
      }

      function cardHtml(card, hidden) {
        const cls = "card" + (hidden ? " back" : (card.type === "num" ? "" : " special"));
        const txt = hidden ? "？？" : card.label;
        return `<div class="${cls}">${txt}</div>`;
      }

      function renderScores() {
        el.scoreRow.innerHTML = "";
        const you = document.createElement("div");
        you.className = "chip";
        you.textContent = "あなた: " + state.scores[0];
        const npc = document.createElement("div");
        npc.className = "chip";
        npc.textContent = "NPC: " + state.scores[1];
        el.scoreRow.appendChild(you);
        el.scoreRow.appendChild(npc);
      }

      function renderCards() {
        el.npcCards.innerHTML = state.hands[1].map((c) => cardHtml(c, false)).join("");
        const revealPlayer = state.phase === "reveal" || state.gameOver;
        el.playerCards.innerHTML = state.hands[0].map((c) => cardHtml(c, !revealPlayer)).join("");
      }

      function renderOpenedList() {
        el.openedList.innerHTML = "";
        const sorted = state.openedCards.slice().sort((a, b) => {
          if (a.type === "num" && b.type === "num") return a.point - b.point;
          if (a.type === "num") return -1;
          if (b.type === "num") return 1;
          if (a.type === b.type) return 0;
          if (a.type === "max0") return -1;
          if (b.type === "max0") return 1;
          return 0;
        });
        for (let i = 0; i < sorted.length; i += 1) {
          const chip = document.createElement("div");
          chip.className = "open-chip";
          chip.textContent = sorted[i].label;
          el.openedList.appendChild(chip);
        }
      }

      function render() {
        el.roundInfo.textContent = "ラウンド: " + state.round + " / " + state.totalRounds;
        el.deckInfo.textContent = "山札残り: " + state.deck.length;
        el.turnInfo.textContent = "手番: " + (state.turn === 0 ? "あなた" : "NPC");
        el.bidInfo.textContent = "現在宣言: " + (state.currentBid == null ? "なし" : state.currentBid + "（" + (state.currentBidBy === 0 ? "あなた" : "NPC") + "）");
        el.sumValue.textContent = state.lastTotal == null ? "--" : String(state.lastTotal);
        el.bidValue.textContent = state.currentBid == null ? "--" : String(state.currentBid);
        if (state.currentBid != null && state.lastTotal != null) {
          el.cmpValue.textContent = state.currentBid > state.lastTotal ? ">" : (state.currentBid < state.lastTotal ? "<" : "=");
        } else {
          el.cmpValue.textContent = "-";
        }

        const playerTurn = state.turn === 0;
        const bidding = state.phase === "bidding";
        el.bidInput.disabled = !playerTurn || !bidding || state.gameOver || state.cutinActive;
        el.declareBtn.disabled = !playerTurn || !bidding || state.gameOver || state.cutinActive;
        el.overBtn.disabled = !playerTurn || !bidding || state.currentBid == null || state.gameOver || state.cutinActive;
        el.nextBtn.textContent = state.gameOver ? "リトライ" : "次ラウンド";
        el.nextBtn.disabled = (!state.gameOver && state.phase !== "reveal") || state.cutinActive;

        renderScores();
        renderCards();
        renderOpenedList();
      }

      function calcTotal(cards) {
        const numCards = cards.filter((c) => c.type === "num");
        let sum = numCards.reduce((a, c) => a + c.value, 0);

        const hasMax0 = cards.some((c) => c.type === "max0");
        if (hasMax0 && numCards.length > 0) {
          let maxValue = numCards[0].value;
          for (let i = 1; i < numCards.length; i += 1) {
            if (numCards[i].value > maxValue) maxValue = numCards[i].value;
          }
          sum -= maxValue;
        }

        const x2count = cards.filter((c) => c.type === "x2").length;
        if (x2count > 0) sum *= Math.pow(2, x2count);

        return { total: sum, hasMax0, x2count };
      }

      function calcRoundPoints(cards) {
        return cards.reduce((a, c) => a + c.point, 0);
      }

      function resolveOver(overCaller) {
        const all = state.hands[0].concat(state.hands[1]);
        const result = calcTotal(all);
        const points = calcRoundPoints(all);

        const prevBid = state.currentBid;
        const prevBidBy = state.currentBidBy;
        let loser;
        if (result.total > prevBid) loser = overCaller;
        else loser = prevBidBy;
        const winner = loser === 0 ? 1 : 0;

        state.scores[winner] += points;
        state.phase = "reveal";

        const who = (i) => (i === 0 ? "あなた" : "NPC");
        const detail = [];
        detail.push("公開: あなた[" + state.hands[0].map((c) => c.label).join(",") + "] / NPC[" + state.hands[1].map((c) => c.label).join(",") + "]");
        detail.push("実合計=" + result.total + "（MAX0:" + (result.hasMax0 ? "あり" : "なし") + " / ×2枚数:" + result.x2count + "）");
        detail.push("勝者=" + who(winner) + "（獲得ポイント " + points + "）");

        el.reveal.innerHTML = detail.map((t) => `<div class="chip">${t}</div>`).join("");
        state.lastTotal = result.total;
        const opened = state.hands[0].concat(state.hands[1]).map((c) => ({ ...c }));
        state.openedCards.push(...opened);
        setMessage(who(overCaller) + " がオーバー宣言。" + who(winner) + " がラウンド勝利。", winner === 0 ? "ok" : "bad");
        log("R" + state.round + ": " + who(overCaller) + "がオーバー -> 実合計" + result.total + " / 勝者:" + who(winner) + " / +" + points);

        render();
        return winner;
      }

      async function playerDeclare() {
        if (state.turn !== 0 || state.phase !== "bidding" || state.gameOver) return;
        const v = Number(el.bidInput.value);
        if (!Number.isFinite(v) || !Number.isInteger(v)) {
          setMessage("整数を入力してください。", "bad");
          return;
        }
        if (state.currentBid != null && v <= state.currentBid) {
          setMessage("前の宣言より大きい数字を宣言してください。", "bad");
          return;
        }
        state.currentBid = v;
        state.currentBidBy = 0;
        state.turn = 1;
        setMessage("あなたが " + v + " を宣言。NPCの手番です。");
        log("R" + state.round + ": あなた宣言 " + v);
        render();
        await showCutin("NPCのターン", "npc", 620);
        npcAct();
      }

      async function playerOver() {
        if (state.turn !== 0 || state.phase !== "bidding" || state.gameOver) return;
        if (state.currentBid == null) {
          setMessage("最初の手ではオーバーできません。", "bad");
          return;
        }
        await showCutin("オープン", "open", 560);
        const winner = resolveOver(0);
        await showCutin(winner === 0 ? "あなたの勝ち" : "NPCの勝ち", winner === 0 ? "win" : "lose", 760);
      }

      function estimateTotalForNpc() {
        const visible = state.hands[0];
        let knownNumeric = 0;
        let knownMax = null;
        let knownX2 = 0;
        for (let i = 0; i < visible.length; i += 1) {
          const c = visible[i];
          if (c.type === "num") {
            knownNumeric += c.value;
            if (knownMax == null || c.value > knownMax) knownMax = c.value;
          } else if (c.type === "x2") {
            knownX2 += 1;
          }
        }
        let estimate = knownNumeric + 5; // 未知2枚の平均近似
        if (visible.some((c) => c.type === "max0") && knownMax != null) estimate -= knownMax;
        if (knownX2 > 0) estimate *= Math.pow(2, knownX2);
        return estimate;
      }

      async function npcAct() {
        if (state.turn !== 1 || state.phase !== "bidding" || state.gameOver) return;

        const est = estimateTotalForNpc();
        if (state.currentBid == null) {
          const first = Math.max(-10, Math.round(est + (Math.random() * 3 - 1)));
          state.currentBid = first;
          state.currentBidBy = 1;
          state.turn = 0;
          setMessage("NPCが " + first + " を宣言。あなたの手番です。");
          log("R" + state.round + ": NPC宣言 " + first);
          render();
          await showCutin("あなたのターン", "you", 620);
          return;
        }

        const margin = Math.random() < 0.5 ? 0 : 1;
        if (est <= state.currentBid - margin) {
          setMessage("NPCがオーバーを宣言。公開判定します。");
          await showCutin("オープン", "open", 560);
          const winner = resolveOver(1);
          await showCutin(winner === 0 ? "あなたの勝ち" : "NPCの勝ち", winner === 0 ? "win" : "lose", 760);
          return;
        }

        const diff = Math.max(1, Math.round((est - state.currentBid) * 0.45));
        const inc = Math.max(1, Math.min(4, diff + (Math.random() < 0.4 ? 0 : 1)));
        const bid = state.currentBid + inc;
        state.currentBid = bid;
        state.currentBidBy = 1;
        state.turn = 0;
        setMessage("NPCが " + bid + " を宣言。あなたの手番です。");
        log("R" + state.round + ": NPC宣言 " + bid);
        render();
        await showCutin("あなたのターン", "you", 620);
      }

      async function nextRound() {
        if (state.cutinActive) return;
        if (state.gameOver) {
          await startGame();
          return;
        }
        if (state.phase !== "reveal") return;
        if (state.round >= state.totalRounds) {
          state.gameOver = true;
          const isDraw = state.scores[0] === state.scores[1];
          const youWin = state.scores[0] > state.scores[1];
          const resultText = isDraw
            ? "ゲーム終了。引き分け。"
            : (youWin ? "ゲーム終了。あなたの勝利！" : "ゲーム終了。NPCの勝利。");
          setMessage(resultText, isDraw || youWin ? "ok" : "bad");
          render();
          if (isDraw) {
            await showCutin("引き分け", "open", 900);
          } else {
            await showCutin(youWin ? "あなたの勝利！" : "NPCの勝利", youWin ? "win" : "lose", 900);
          }
          return;
        }

        state.round += 1;
        state.starter = state.starter === 0 ? 1 : 0;
        dealRound();
        el.reveal.innerHTML = "";
        setMessage((state.turn === 0 ? "あなた" : "NPC") + " が先手です。宣言を開始してください。");
        render();
        if (state.turn === 1) {
          await showCutin("NPCのターン", "npc", 620);
          npcAct();
        } else {
          await showCutin("あなたのターン", "you", 620);
        }
      }

      async function startGame() {
        state.deck = createDeck();
        state.round = 1;
        state.scores = [0, 0];
        state.starter = 0;
        state.gameOver = false;
        state.lastTotal = null;
        state.openedCards = [];
        el.bidInput.value = "";
        el.history.innerHTML = "";
        dealRound();
        el.reveal.innerHTML = "";
        setMessage("ゲーム開始。あなたが先手です。宣言値を入力して宣言してください。");
        render();
        await showCutin("あなたのターン", "you", 700);
      }

      el.declareBtn.addEventListener("click", playerDeclare);
      el.overBtn.addEventListener("click", playerOver);
      el.nextBtn.addEventListener("click", nextRound);
      el.bidInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") playerDeclare();
      });

      startGame();
    })();
  </script>
</body>
</html>
