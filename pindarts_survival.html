<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ピンダーツサバイバル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFF0F5;
            /* ゆめかわいいパステルピンク背景 */
            overflow: hidden;
            touch-action: none;
            /* デフォルトのスワイプやズームを無効化 */
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 600px;
            /* PCなど大画面時は制限 */
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            /* ピンクのシャドウ */
        }

        canvas {
            display: block;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <script>
        // ==========================================
        // 定数・ゲーム設定
        // ==========================================
        const CONFIG = {
            width: window.innerWidth > 600 ? 600 : window.innerWidth,
            height: window.innerHeight,
            colors: {
                bg: 0xFFF0F5,        // 背景（LavenderBlush）
                player: 0xFF69B4,    // プレイヤー（HotPink）
                powerBarBg: 0xFFC0CB,// パワーゲージ背景
                powerBar: 0x87CEFA,  // パワーゲージ（LightSkyBlue）
                hpBarBg: 0xDDA0DD,   // HPゲージ背景（Plum）
                hpBar: 0x32CD32,     // HPゲージ（LimeGreen）
                targetOuter: 0xE6E6FA,// 的アウター（Lavender）
                targetInner: 0xFFB6C1,// 的インナー（LightPink）
                targetBull: 0xFF1493, // 的中心（DeepPink）
                obstacle: 0x9370DB,  // 障害物（MediumPurple）
                text: 0x4B0082       // テキスト（Indigo）
            },
            physics: {
                gravity: 800,
                bounce: 0.8
            },
            player: {
                maxPower: 100,
                maxHp: 100,
                powerDepletionRate: 0, // 一旦パワーは減らさない
                size: 16
            },
            game: {
                scrollThreshold: window.innerHeight * 0.6 // このY座標より上に行くと背景がスクロール
            }
        };

        // ==========================================
        // シーンの実装
        // ==========================================

        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            create() {
                this.scene.start('TitleScene');
            }
        }

        class TitleScene extends Phaser.Scene {
            constructor() { super('TitleScene'); }

            create() {
                this.cameras.main.setBackgroundColor(CONFIG.colors.bg);

                // 星の背景（共有）
                this.stars = [];
                for (let i = 0; i < 50; i++) {
                    const x = Phaser.Math.Between(0, CONFIG.width);
                    const y = Phaser.Math.Between(0, CONFIG.height);
                    const size = Phaser.Math.Between(2, 6);
                    const alpha = Phaser.Math.FloatBetween(0.3, 0.8);
                    const star = this.add.circle(x, y, size, 0xFFFFFF, alpha);
                    this.stars.push({ sprite: star, speed: Phaser.Math.FloatBetween(0.5, 2) });
                }

                // タイトルテキスト
                const titleText = this.add.text(CONFIG.width / 2, CONFIG.height * 0.3, 'ピンダーツ\nサバイバル', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '48px', color: '#FF1493', fontWeight: 900,
                    align: 'center', stroke: '#FFF', strokeThickness: 8
                }).setOrigin(0.5, 0.5);

                this.tweens.add({
                    targets: titleText,
                    y: titleText.y - 15,
                    duration: 1500,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                // 説明
                const descText = this.add.text(CONFIG.width / 2, CONFIG.height * 0.55, 'スワイプでピンを飛ばして的に当てよう！\n飛んでる時にタップで止まるよ\nパワー切れと障害物に注意してね💕', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '18px', color: '#4B0082', align: 'center', fontWeight: 700,
                    lineSpacing: 10
                }).setOrigin(0.5, 0.5);

                // スタートボタン
                const btnBg = this.add.graphics();
                btnBg.fillStyle(0xFF69B4, 1);
                btnBg.fillRoundedRect(CONFIG.width / 2 - 100, CONFIG.height * 0.75, 200, 60, 30);

                const btnText = this.add.text(CONFIG.width / 2, CONFIG.height * 0.75 + 30, 'START', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '24px', color: '#FFF', fontWeight: 900
                }).setOrigin(0.5, 0.5);

                this.tweens.add({
                    targets: [btnText],
                    scaleX: 1.1, scaleY: 1.1,
                    duration: 800, yoyo: true, repeat: -1
                });

                const btnZone = this.add.zone(CONFIG.width / 2, CONFIG.height * 0.75 + 30, 200, 60).setInteractive();
                btnZone.on('pointerdown', () => {
                    this.scene.start('GameScene');
                });
            }

            update(time, delta) {
                // 背景スクロール
                const scrollSpeed = 0.5;
                this.stars.forEach(star => {
                    star.sprite.y += scrollSpeed * star.speed;
                    if (star.sprite.y > CONFIG.height) star.sprite.y = 0;
                });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            create() {
                this.cameras.main.setBackgroundColor(CONFIG.colors.bg);

                // 状態変数の初期化（UIなどの生成前に実行）
                this.gameState = {
                    power: CONFIG.player.maxPower,
                    hp: CONFIG.player.maxHp,
                    isFlying: false,
                    isCharging: false,
                    isFalling: false,
                    isDead: false,
                    swipeStart: new Phaser.Math.Vector2(),
                    score: 0,
                    distance: 0,
                    nextSpawnDistance: 200
                };

                // 各種グループ・配列の初期化
                this.targets = this.physics.add.group();
                this.obstacles = this.physics.add.group();
                this.screenObjects = [];

                this.createStars();
                this.createPlayer();
                this.createUI();
                this.setupInput();

                // 衝突判定の設定 (ターゲットはストップ時に判定するためoverlapから除外)
                this.physics.add.overlap(this.playerBody, this.obstacles, this.hitObstacle, null, this);

                // 初期オブジェクト生成
                this.spawnObjects(CONFIG.height * 0.3);
                this.spawnObjects(CONFIG.height * 0.1);
            }

            createStars() {
                this.stars = [];
                for (let i = 0; i < 50; i++) {
                    const x = Phaser.Math.Between(0, CONFIG.width);
                    const y = Phaser.Math.Between(0, CONFIG.height);
                    const size = Phaser.Math.Between(2, 6);
                    const alpha = Phaser.Math.FloatBetween(0.3, 0.8);

                    const star = this.add.circle(x, y, size, 0xFFFFFF, alpha);
                    this.stars.push({ sprite: star, speed: Phaser.Math.FloatBetween(0.5, 2) });
                }
            }

            createPlayer() {
                const startX = CONFIG.width / 2;
                const startY = CONFIG.height * 0.8;

                this.player = this.add.container(startX, startY);
                this.player.setDepth(50);

                const graphics = this.add.graphics();
                // 照準（ロケットの先）
                graphics.lineStyle(2, 0xFF0000, 0.8);
                graphics.strokeCircle(0, -CONFIG.player.size * 2.5, 6);
                graphics.beginPath();
                graphics.moveTo(0, -CONFIG.player.size * 2.5 - 3);
                graphics.lineTo(0, -CONFIG.player.size * 2.5 + 3);
                graphics.moveTo(-3, -CONFIG.player.size * 2.5);
                graphics.lineTo(3, -CONFIG.player.size * 2.5);
                graphics.strokePath();

                graphics.fillStyle(CONFIG.colors.player, 1);
                // 上向きの三角形（ピン）
                graphics.fillTriangle(
                    0, -CONFIG.player.size * 1.5,
                    -CONFIG.player.size, CONFIG.player.size,
                    CONFIG.player.size, CONFIG.player.size
                );
                // 丸い飾り
                graphics.fillStyle(0xFFFFFF, 1);
                graphics.fillCircle(0, CONFIG.player.size * 0.5, 6);

                // HP表示テキスト
                this.playerHpText = this.add.text(0, CONFIG.player.size * 2, '100', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '14px', color: '#FFF', fontWeight: 900,
                    stroke: '#FF69B4', strokeThickness: 3
                }).setOrigin(0.5, 0.5);
                // テキストが回転しないように親コンテナの逆に回転させるのは少し大変なので、固定テキストとして見やすくするため少し大きめのstrokeにする

                this.playerBody = this.physics.add.sprite(0, 0, null).setSize(CONFIG.player.size * 1.5, CONFIG.player.size * 2);
                this.playerBody.setVisible(false);

                this.player.add([graphics, this.playerHpText, this.playerBody]);
                this.physics.world.enable(this.player);

                const body = this.player.body;
                body.setCollideWorldBounds(true);
                body.setBounce(CONFIG.physics.bounce, 0);
                body.setAllowGravity(false);
                body.setCircle(CONFIG.player.size * 0.8);
                body.setOffset(-CONFIG.player.size * 0.8, -CONFIG.player.size * 0.8);

                this.aimLine = this.add.graphics();
                this.aimLine.setDepth(10);
            }

            // 新規: オブジェクト（的・障害物）の生成
            spawnObjects(yPos) {
                // 画面外上部に生成
                yPos = yPos || -100;

                // 障害物を増やしたいので比率調整や複数生成を実施
                const isTarget = Phaser.Math.Between(0, 100) > 40; // 60%的、40%障害物

                if (isTarget) {
                    const xPos = Phaser.Math.Between(120, CONFIG.width - 120);
                    this.createTarget(xPos, yPos);
                } else {
                    // 障害物の場合は一気に3つ生成（3倍）
                    for (let i = 0; i < 3; i++) {
                        const xPos = Phaser.Math.Between(30, CONFIG.width - 30);
                        const yOffset = Phaser.Math.Between(-80, 80);
                        this.createObstacle(xPos, yPos + yOffset);
                    }
                }
            }

            createTarget(x, y) {
                const target = this.add.container(x, y);

                // 的のサイズを約4倍拡大
                const rOuter = 120;
                const rInner = 75;
                const rBull = 30;

                const graphics = this.add.graphics();
                // アウター
                graphics.fillStyle(CONFIG.colors.targetOuter, 1);
                graphics.fillCircle(0, 0, rOuter);
                // インナー
                graphics.fillStyle(CONFIG.colors.targetInner, 1);
                graphics.fillCircle(0, 0, rInner);
                // ブル
                graphics.fillStyle(CONFIG.colors.targetBull, 1);
                graphics.fillCircle(0, 0, rBull);

                const physicsBody = this.physics.add.sprite(0, 0, null).setSize(rOuter * 2, rOuter * 2);
                physicsBody.setVisible(false);
                physicsBody.setCircle(rOuter);
                physicsBody.setOffset(-rOuter, -rOuter);

                target.add([graphics, physicsBody]);
                this.physics.world.enable(target);
                target.body.setImmovable(true);
                target.body.setAllowGravity(false);
                target.physicsBody = physicsBody;

                // カスタムプロパティ
                physicsBody.parentContainer = target;
                physicsBody.isTarget = true;

                this.targets.add(physicsBody);
                this.screenObjects.push(target);
            }

            createObstacle(x, y) {
                const obstacle = this.add.container(x, y);
                const size = Phaser.Math.Between(30, 60);

                const graphics = this.add.graphics();
                graphics.fillStyle(CONFIG.colors.obstacle, 1);

                // トゲトゲを表現
                graphics.lineStyle(4, 0xFFFFFF, 1);
                graphics.strokeRect(-size / 2, -size / 2, size, size);
                graphics.fillRect(-size / 2, -size / 2, size, size);

                // バツ印
                graphics.lineBetween(-size / 2 + 5, -size / 2 + 5, size / 2 - 5, size / 2 - 5);
                graphics.lineBetween(size / 2 - 5, -size / 2 + 5, -size / 2 + 5, size / 2 - 5);

                // HPダメージ表記 (-20)
                const dmgText = this.add.text(0, 0, '-20', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '14px', color: '#FFF', fontWeight: 900,
                    stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5, 0.5);

                const physicsBody = this.physics.add.sprite(0, 0, null).setSize(size, size);
                physicsBody.setVisible(false);

                obstacle.add([graphics, dmgText, physicsBody]);
                this.physics.world.enable(obstacle);
                obstacle.body.setImmovable(true);
                obstacle.body.setAllowGravity(false);
                obstacle.physicsBody = physicsBody;

                physicsBody.parentContainer = obstacle;

                this.obstacles.add(physicsBody);
                this.screenObjects.push(obstacle);
            }

            createUI() {
                // UIコンテナ
                this.uiContainer = this.add.container(0, 0);
                this.uiContainer.setScrollFactor(0);
                this.uiContainer.setDepth(100);

                // パワーバー
                this.powerBg = this.add.graphics();
                this.powerBg.fillStyle(CONFIG.colors.powerBarBg, 1);
                this.powerBg.fillRoundedRect(CONFIG.width / 2 - 140, 20, 130, 20, 10);

                this.powerFill = this.add.graphics();
                this.powerText = this.add.text(CONFIG.width / 2 - 140 + 65, 30, 'POWER', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '12px', color: '#FFF', fontWeight: 900
                }).setOrigin(0.5, 0.5);

                // HPバー
                this.hpBg = this.add.graphics();
                this.hpBg.fillStyle(CONFIG.colors.hpBarBg, 1);
                this.hpBg.fillRoundedRect(CONFIG.width / 2 + 10, 20, 130, 20, 10);

                this.hpFill = this.add.graphics();
                this.hpText = this.add.text(CONFIG.width / 2 + 10 + 65, 30, 'HP 100', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '12px', color: '#FFF', fontWeight: 900
                }).setOrigin(0.5, 0.5);

                // スコア
                this.scoreText = this.add.text(CONFIG.width / 2, 60, 'SCORE: 0', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '20px', color: '#4B0082', fontWeight: 900
                }).setOrigin(0.5, 0.5);
                this.scoreText.setShadow(2, 2, '#FFF', 2, true, true);

                this.uiContainer.add([this.powerBg, this.powerFill, this.powerText, this.hpBg, this.hpFill, this.hpText, this.scoreText]);

                this.updateBars();

                this.instructionText = this.add.text(CONFIG.width / 2, CONFIG.height * 0.6, 'スワイプして発射！\n的に当ててHP回復\n障害物は避けて！', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '18px', color: '#4B0082', align: 'center', fontWeight: 700
                }).setOrigin(0.5, 0.5);
            }

            setupInput() {
                this.input.on('pointerdown', (pointer) => {
                    if (this.gameState.isDead) return;

                    if (this.gameState.isFlying) {
                        this.stopFlying();
                        return;
                    }

                    this.gameState.isCharging = true;
                    this.gameState.swipeStart.set(pointer.x, pointer.y);
                    this.instructionText.setVisible(false);
                });

                this.input.on('pointermove', (pointer) => {
                    if (!this.gameState.isCharging) return;
                    this.drawAimLine(pointer);
                });

                this.input.on('pointerup', (pointer) => {
                    if (!this.gameState.isCharging) return;
                    this.gameState.isCharging = false;
                    this.aimLine.clear();

                    // ゴム飛行機のように「引っ張った方向（下）の反対（上）」へ飛ぶ
                    const dx = pointer.x - this.gameState.swipeStart.x;
                    const dy = pointer.y - this.gameState.swipeStart.y;

                    // dyがプラス（下方向へのひっぱり）のときだけ発射する
                    if (dy > 20) {
                        this.launchPlayer(dx, dy);
                    }
                });
            }

            drawAimLine(pointer) {
                this.aimLine.clear();
                // 引っ張り量（スワイプ量）
                const dragX = pointer.x - this.gameState.swipeStart.x;
                const dragY = pointer.y - this.gameState.swipeStart.y;

                // 下方向へ引っ張ったときのみ描画
                if (dragY <= 0) return;

                // 飛ばす方向は引っ張った向きの「逆」ベクトル
                const dx = -dragX;
                const dy = -dragY;

                const maxDist = 300;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxDist) dist = maxDist;

                const angle = Math.atan2(dy, dx);

                this.aimLine.lineStyle(4, 0x87CEFA, 0.8);
                this.aimLine.beginPath();
                this.aimLine.moveTo(this.player.x, this.player.y);

                const targetX = this.player.x + Math.cos(angle) * dist * 1.5;
                const targetY = this.player.y + Math.sin(angle) * dist * 1.5;

                this.aimLine.lineTo(targetX, targetY);
                this.aimLine.strokePath();

                this.player.setRotation(angle + Math.PI / 2);
            }

            launchPlayer(dragX, dragY) {
                if (this.gameState.power <= 0) return;

                const body = this.player.body;
                const maxSpeed = 1200;
                const powerMultiplier = 3.5;

                // 飛ばす速度ベクトルは、引っ張った方向の逆
                let vx = -dragX * powerMultiplier;
                let vy = -dragY * powerMultiplier;

                const speed = Math.sqrt(vx * vx + vy * vy);
                if (speed > maxSpeed) {
                    const ratio = maxSpeed / speed;
                    vx *= ratio;
                    vy *= ratio;
                }

                body.setVelocity(vx, vy);
                this.gameState.isFlying = true;
                this.player.setRotation(Math.atan2(vy, vx) + Math.PI / 2);
            }

            stopFlying() {
                const body = this.player.body;
                body.setVelocity(0, 0);
                this.gameState.isFlying = false;

                this.checkTargetHits();
            }

            checkTargetHits() {
                const angle = this.player.rotation - Math.PI / 2;
                const aimDist = CONFIG.player.size * 2.5; // 照準の距離
                const aimX = this.player.x + Math.cos(angle) * aimDist;
                const aimY = this.player.y + Math.sin(angle) * aimDist;

                const targetsArray = this.targets.getChildren();
                for (let i = targetsArray.length - 1; i >= 0; i--) {
                    const tBody = targetsArray[i];
                    if (!tBody.parentContainer) continue;

                    const target = tBody.parentContainer;
                    const dist = Phaser.Math.Distance.Between(aimX, aimY, target.x, target.y);

                    if (dist > 120) continue; // アウター(120)より外は外れ

                    let points = 10;
                    let textStr = "HIT! +10";

                    if (dist < 30) {
                        points = 50; // ブル
                        textStr = "BULL! +50";
                    } else if (dist < 75) {
                        points = 30; // インナー
                        textStr = "GREAT! +30";
                    }

                    this.addScore(points);
                    this.addHp(points);

                    this.showFloatingText(target.x, target.y, textStr, '#FF1493');
                    this.createHitParticles(target.x, target.y, CONFIG.colors.targetBull);

                    tBody.destroy();
                    target.destroy();
                    this.screenObjects = this.screenObjects.filter(obj => obj !== target);
                }
            }

            // --- 衝突判定 ---

            hitObstacle(playerBody, obstacleBody) {
                if (!obstacleBody.parentContainer) return;

                const ob = obstacleBody.parentContainer;
                const damage = 20;

                this.addHp(-damage);

                // バウンドはせず通過するように変更
                this.showFloatingText(ob.x, ob.y, "-" + damage, '#FF0000');
                this.createHitParticles(ob.x, ob.y, CONFIG.colors.obstacle);

                // 障害物破壊
                obstacleBody.destroy();
                ob.destroy();
                this.screenObjects = this.screenObjects.filter(obj => obj !== ob);
            }

            showFloatingText(x, y, text, color) {
                const floatText = this.add.text(x, y, text, {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '24px', color: color, fontWeight: 900,
                    stroke: '#FFF', strokeThickness: 4
                }).setOrigin(0.5, 0.5).setDepth(80);

                this.tweens.add({
                    targets: floatText,
                    y: y - 50,
                    alpha: 0,
                    duration: 800,
                    ease: 'Power1',
                    onComplete: () => floatText.destroy()
                });
            }

            createHitParticles(x, y, color) {
                // 簡易パーティクル
                for (let i = 0; i < 8; i++) {
                    const p = this.add.circle(x, y, 4, color).setDepth(79);
                    this.physics.world.enable(p);
                    p.body.setVelocity(Phaser.Math.Between(-150, 150), Phaser.Math.Between(-150, 150));
                    this.tweens.add({
                        targets: p, alpha: 0, scale: 0, duration: 600,
                        onComplete: () => p.destroy()
                    });
                }
            }

            addScore(pts) {
                this.gameState.score += pts;
                this.scoreText.setText('SCORE: ' + Math.floor(this.gameState.score));
            }

            addHp(amount) {
                this.gameState.hp += amount;
                if (this.gameState.hp > CONFIG.player.maxHp) this.gameState.hp = CONFIG.player.maxHp;
                if (this.gameState.hp <= 0) {
                    this.gameState.hp = 0;
                    this.triggerFall(); // HP0でも落下してゲームオーバー
                }
                this.updateBars();
                if (this.playerHpText) {
                    this.playerHpText.setText(Math.floor(this.gameState.hp));
                }
            }

            update(time, delta) {
                if (this.gameState.isDead) return;

                const body = this.player.body;

                if (this.gameState.isFlying) {
                    if (Math.abs(body.velocity.y) < 10) {
                        this.stopFlying();
                    } else {
                        // パワー消費
                        this.gameState.power -= CONFIG.player.powerDepletionRate * (delta / 1000);
                        this.updateBars();

                        this.player.setRotation(Math.atan2(body.velocity.y, body.velocity.x) + Math.PI / 2);

                        if (this.gameState.power <= 0) {
                            this.gameState.power = 0;
                            this.triggerFall();
                        }
                    }
                }

                // --- 相対スクロール処理 ---
                // プレイヤーが画面上部 (scrollThreshold) を超えそうになったら
                // プレイヤーを押し下げ、代わりに他のオブジェクトを下げる
                if (this.player.y < CONFIG.game.scrollThreshold) {
                    const diff = CONFIG.game.scrollThreshold - this.player.y;

                    // プレイヤーの表示位置を固定
                    this.player.y = CONFIG.game.scrollThreshold;

                    // スクロール量としてスコアを加算（進んだ距離）
                    this.addScore(diff * 0.1);
                    this.gameState.distance += diff;

                    // 背景・オブジェクトをスクロール
                    this.stars.forEach(star => {
                        star.sprite.y += diff * 0.5 * star.speed;
                        if (star.sprite.y > CONFIG.height) star.sprite.y = 0;
                    });

                    this.screenObjects.forEach(obj => {
                        obj.y += diff;
                        // 画面外に消えたら削除
                        if (obj.y > CONFIG.height + 100) {
                            if (obj.physicsBody && obj.physicsBody.active) {
                                obj.physicsBody.destroy();
                            }
                            obj.destroy();
                        }
                    });

                    // 配列のクリーンアップ
                    this.screenObjects = this.screenObjects.filter(obj => obj.active);

                    // 定期的に新しいオブジェクトを生成
                    if (this.gameState.distance > this.gameState.nextSpawnDistance) {
                        this.spawnObjects();
                        // 進行に応じて生成間隔を短くする（難易度上昇）
                        const spawnInterval = Math.max(100, 300 - (this.gameState.score * 0.05));
                        this.gameState.nextSpawnDistance += spawnInterval;
                    }
                }

                // ====== 画面外落下判定 ======
                // カメラから見た描画位置（ワールド座標のY）で判定する
                const bottomY = CONFIG.height - CONFIG.player.size * 0.6;
                if (this.gameState.isFalling && this.player.y >= bottomY) {
                    this.gameOver();
                }
            }

            updateBars() {
                // パワーバー
                this.powerFill.clear();
                const powerRatio = Math.max(0, this.gameState.power) / CONFIG.player.maxPower;
                let pColor = CONFIG.colors.powerBar;
                if (powerRatio < 0.3) pColor = 0xFF6347;
                this.powerFill.fillStyle(pColor, 1);
                const pWidth = 126 * powerRatio;
                if (pWidth > 0) this.powerFill.fillRoundedRect(CONFIG.width / 2 - 138, 22, pWidth, 16, 8);

                // HPバー
                this.hpFill.clear();
                const hpRatio = Math.max(0, this.gameState.hp) / CONFIG.player.maxHp;
                let hColor = CONFIG.colors.hpBar;
                if (hpRatio < 0.3) hColor = 0xFF0000;
                this.hpFill.fillStyle(hColor, 1);
                const hWidth = 126 * hpRatio;
                if (hWidth > 0) this.hpFill.fillRoundedRect(CONFIG.width / 2 + 12, 22, hWidth, 16, 8);
                this.hpText.setText('HP ' + Math.floor(this.gameState.hp));
            }

            triggerFall() {
                if (this.gameState.isFalling || this.gameState.isDead) return;
                this.gameState.isFlying = false;
                this.gameState.isFalling = true;
                const body = this.player.body;
                body.setAllowGravity(true);
                body.setGravityY(CONFIG.physics.gravity);
                body.setBounce(0, 0); // バウンドをなくす
                body.setVelocityX(0); // 左右の動きを止める
                body.setCollideWorldBounds(false); // 最下部到達でゲームオーバー判定させる
                this.player.setAlpha(0.6);
            }

            gameOver() {
                if (this.gameState.isDead) return;
                this.gameState.isDead = true;

                this.player.body.setVelocity(0, 0); // 完全に停止
                this.player.body.setAllowGravity(false); // 落下も停止

                // 画面を暗くする
                const overlay = this.add.graphics();
                overlay.fillStyle(0x000000, 0.5);
                overlay.fillRect(0, 0, CONFIG.width, CONFIG.height);
                overlay.setDepth(200);

                this.add.text(CONFIG.width / 2, CONFIG.height / 2 - 50, 'GAME OVER', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '48px', color: '#FF1493', fontWeight: 900,
                    stroke: '#FFF', strokeThickness: 8
                }).setOrigin(0.5, 0.5).setDepth(201);

                this.add.text(CONFIG.width / 2, CONFIG.height / 2 + 10, 'FINAL SCORE: ' + Math.floor(this.gameState.score), {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '28px', color: '#FFF', fontWeight: 700
                }).setOrigin(0.5, 0.5).setDepth(201);

                const btnBg = this.add.graphics();
                btnBg.fillStyle(0xFF69B4, 1);
                btnBg.fillRoundedRect(CONFIG.width / 2 - 90, CONFIG.height / 2 + 70, 180, 50, 25);
                btnBg.setDepth(201);

                const btnText = this.add.text(CONFIG.width / 2, CONFIG.height / 2 + 95, 'もういちど遊ぶ', {
                    fontFamily: '"M PLUS Rounded 1c"', fontSize: '20px', color: '#FFF', fontWeight: 700
                }).setOrigin(0.5, 0.5).setDepth(202);

                this.tweens.add({
                    targets: btnText,
                    scaleX: 1.05,
                    scaleY: 1.05,
                    duration: 700,
                    yoyo: true,
                    repeat: -1
                });

                const btnZone = this.add.zone(CONFIG.width / 2, CONFIG.height / 2 + 95, 180, 50).setInteractive();
                btnZone.setDepth(203);
                btnZone.on('pointerdown', () => {
                    this.scene.restart();
                });
            }
        }

        // ==========================================
        // Phaserの起動設定
        // ==========================================
        const gameConfig = {
            type: Phaser.AUTO,
            width: CONFIG.width,
            height: CONFIG.height,
            parent: 'game-container',
            backgroundColor: '#FFF0F5',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [BootScene, TitleScene, GameScene],
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            }
        };

        const game = new Phaser.Game(gameConfig);
    </script>
</body>

</html>
