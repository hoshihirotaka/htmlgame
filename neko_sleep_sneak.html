<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>ねこねむり こっそりステージ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff0f5;
      --panel: rgba(255, 255, 255, 0.85);
      --text: #6b4f62;
      --accent: #ff7bb5;
      --accent-2: #87d8ff;
      --ok: #65d6a6;
      --warn: #ff9a87;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #ffe6f2, #fff0f5 50%, #ffe8ff);
      font-family: "M PLUS Rounded 1c", sans-serif;
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
    }

    .top-bar {
      margin-top: 8px;
      background: var(--panel);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 6px 16px rgba(255, 149, 189, 0.2);
      pointer-events: auto;
      align-self: stretch;
    }

    .title {
      font-size: 14px;
      font-weight: 900;
      margin: 0;
    }

    .status {
      margin: 4px 0 0;
      font-size: 12px;
      font-weight: 700;
    }

    .hud-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge {
      background: #fff;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .ctrl-wrap {
      align-self: center;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px;
      gap: 8px;
      pointer-events: auto;
      user-select: none;
    }

    .ctrl {
      border: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-weight: 900;
      font-size: 20px;
      box-shadow: 0 6px 12px rgba(135, 216, 255, 0.25);
    }

    .ctrl:active,
    .ctrl.active {
      transform: translateY(1px) scale(0.98);
      background: #fff;
      box-shadow: 0 2px 6px rgba(135, 216, 255, 0.3);
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 240, 245, 0.8);
      pointer-events: auto;
      padding: 16px;
    }

    .card {
      width: min(92vw, 360px);
      background: #fff;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(255, 123, 181, 0.25);
      text-align: center;
    }

    .card h1,
    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #ff5fa6;
    }

    .card p {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: inherit;
      font-weight: 900;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(135deg, #ff86bf, #ff5fa6);
      box-shadow: 0 8px 14px rgba(255, 95, 166, 0.28);
    }

    .btn.sub {
      background: linear-gradient(135deg, #96dfff, #70c5ff);
      box-shadow: 0 8px 14px rgba(112, 197, 255, 0.28);
    }

    .hidden {
      display: none;
    }

    #msg {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      font-weight: 700;
      color: #f35f7d;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <div class="top-bar">
      <p class="title">ねこねむり こっそりステージ</p>
      <p id="statusText" class="status">状態: 準備中</p>
      <div class="hud-row">
        <span id="collectText" class="badge">あつめた: 0/0</span>
        <span id="hideText" class="badge">かくれ: していない</span>
      </div>
      <div id="msg"></div>
    </div>

    <div class="ctrl-wrap" id="touchControls">
      <button class="ctrl up" data-dir="up">▲</button>
      <button class="ctrl left" data-dir="left">◀</button>
      <button class="ctrl down" data-dir="down">▼</button>
      <button class="ctrl right" data-dir="right">▶</button>
    </div>
  </div>

  <div id="startOverlay" class="overlay">
    <div class="card">
      <h1>こっそり ねこミッション</h1>
      <p>ねこが <strong>ねている間</strong> に近づいて、
        キラキラをぜんぶ集めよう。</p>
      <p>起きているときは、木やきのこの影にかくれると安全だよ。</p>
      <p>操作: 画面ボタン / キーボード（WASD・矢印）</p>
      <div class="row">
        <button class="btn sub" data-avatar="boy">男の子</button>
        <button class="btn sub" data-avatar="girl">女の子</button>
      </div>
      <div class="row">
        <button id="startBtn" class="btn">スタート</button>
      </div>
      <p id="selectText">主人公をえらんでね</p>
    </div>
  </div>

  <div id="clearOverlay" class="overlay hidden">
    <div class="card">
      <h2>ステージクリア！</h2>
      <p>ぜんぶ集めてゴールできたね！</p>
      <div class="row">
        <button id="retryBtn" class="btn">もういちど</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const app = document.getElementById("app");
    const startOverlay = document.getElementById("startOverlay");
    const clearOverlay = document.getElementById("clearOverlay");
    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");
    const selectText = document.getElementById("selectText");
    const statusText = document.getElementById("statusText");
    const collectText = document.getElementById("collectText");
    const hideText = document.getElementById("hideText");
    const msg = document.getElementById("msg");

    let selectedAvatar = null;

    const state = {
      running: false,
      clear: false,
      collected: 0,
      totalCollectibles: 8,
      catSleeping: true,
      hidden: false,
      freezeUntil: 0,
      goalOpen: false
    };

    const keys = { up: false, down: false, left: false, right: false };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff0f5);
    scene.fog = new THREE.Fog(0xfff0f5, 18, 55);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xffcce0, 1.0);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(4, 10, 2);
    scene.add(sun);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(36, 48),
      new THREE.MeshStandardMaterial({ color: 0xc8f5d7, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.z = 2;
    scene.add(floor);

    const path = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 45),
      new THREE.MeshStandardMaterial({ color: 0xfffef4, roughness: 1 })
    );
    path.rotation.x = -Math.PI / 2;
    path.position.set(0, 0.01, 2);
    scene.add(path);

    const cloudGroup = new THREE.Group();
    scene.add(cloudGroup);
    for (let i = 0; i < 8; i++) {
      const puff = new THREE.Mesh(
        new THREE.SphereGeometry(1.1 + Math.random() * 0.5, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 })
      );
      puff.position.set((Math.random() - 0.5) * 30, 8 + Math.random() * 5, -8 + Math.random() * 30);
      cloudGroup.add(puff);
    }

    function createAvatar(type) {
      const g = new THREE.Group();
      const bodyColor = type === "boy" ? 0x8fd9ff : 0xffa7d1;
      const hairColor = type === "boy" ? 0x5b4b6a : 0x7a4f66;

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.45, 0.8, 6, 12),
        new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.8 })
      );
      body.position.y = 1.05;
      g.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.42, 20, 20),
        new THREE.MeshStandardMaterial({ color: 0xffe5d1, roughness: 0.8 })
      );
      head.position.y = 1.85;
      g.add(head);

      const hair = new THREE.Mesh(
        new THREE.SphereGeometry(0.44, 20, 20),
        new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.75 })
      );
      hair.scale.set(1, 0.65, 1);
      hair.position.y = 2.02;
      g.add(hair);

      const eyeMat = new THREE.MeshBasicMaterial({ color: 0x3f3550 });
      const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat);
      const eyeR = eyeL.clone();
      eyeL.position.set(-0.13, 1.88, 0.37);
      eyeR.position.set(0.13, 1.88, 0.37);
      g.add(eyeL, eyeR);

      const footL = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 })
      );
      const footR = footL.clone();
      footL.position.set(-0.16, 0.42, 0.06);
      footR.position.set(0.16, 0.42, 0.06);
      g.add(footL, footR);

      g.position.set(0, 0, -18);
      return g;
    }

    let player = createAvatar("boy");
    player.visible = false;
    scene.add(player);

    const cat = new THREE.Group();
    scene.add(cat);
    cat.position.set(0, 0, 18);

    const catBody = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.8, 1.1, 8, 14),
      new THREE.MeshStandardMaterial({ color: 0xffd5a6, roughness: 0.8 })
    );
    catBody.rotation.z = Math.PI / 2;
    catBody.position.y = 0.8;
    cat.add(catBody);

    const catHead = new THREE.Mesh(
      new THREE.SphereGeometry(0.62, 20, 20),
      new THREE.MeshStandardMaterial({ color: 0xffdcb6, roughness: 0.8 })
    );
    catHead.position.set(1.0, 0.95, 0);
    cat.add(catHead);

    const earGeo = new THREE.ConeGeometry(0.18, 0.3, 10);
    const earMat = new THREE.MeshStandardMaterial({ color: 0xffc4a2, roughness: 0.8 });
    const earL = new THREE.Mesh(earGeo, earMat);
    const earR = new THREE.Mesh(earGeo, earMat);
    earL.position.set(0.82, 1.45, -0.23);
    earR.position.set(0.82, 1.45, 0.23);
    earL.rotation.z = -0.2;
    earR.rotation.z = -0.2;
    cat.add(earL, earR);

    const eyeOpenMat = new THREE.MeshBasicMaterial({ color: 0x3c2f2f });
    const eyeCloseMat = new THREE.MeshBasicMaterial({ color: 0xff9f9f });
    const catEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeOpenMat);
    const catEyeR = catEyeL.clone();
    catEyeL.position.set(1.55, 1.03, -0.18);
    catEyeR.position.set(1.55, 1.03, 0.18);
    cat.add(catEyeL, catEyeR);

    const bed = new THREE.Mesh(
      new THREE.CylinderGeometry(1.7, 1.9, 0.25, 24),
      new THREE.MeshStandardMaterial({ color: 0xffc2dc, roughness: 0.9 })
    );
    bed.position.set(0, 0.12, 18);
    scene.add(bed);

    const goalRing = new THREE.Mesh(
      new THREE.TorusGeometry(0.95, 0.2, 16, 30),
      new THREE.MeshStandardMaterial({ color: 0xffe061, emissive: 0xaa7d12, emissiveIntensity: 0.45 })
    );
    goalRing.rotation.x = Math.PI / 2;
    goalRing.position.set(0, 0.9, 14.8);
    goalRing.visible = false;
    scene.add(goalRing);

    const visionCone = new THREE.Mesh(
      new THREE.ConeGeometry(5.5, 18, 30, 1, true),
      new THREE.MeshBasicMaterial({ color: 0xff6f6f, transparent: true, opacity: 0.22, side: THREE.DoubleSide })
    );
    visionCone.rotation.x = -Math.PI / 2;
    visionCone.position.set(0, 0.02, 10.5);
    visionCone.visible = false;
    scene.add(visionCone);

    const hideSpots = [];
    function addHideSpot(x, z, color) {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.3, 1.5, 10),
        new THREE.MeshStandardMaterial({ color: 0xd8a177, roughness: 0.9 })
      );
      trunk.position.y = 0.75;
      const crown = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 14, 14),
        new THREE.MeshStandardMaterial({ color, roughness: 0.9 })
      );
      crown.position.y = 2.0;
      g.add(trunk, crown);
      g.position.set(x, 0, z);
      scene.add(g);
      hideSpots.push({ x, z, radius: 1.65, mesh: g });
    }

    addHideSpot(-3.8, -8, 0x8ee0b3);
    addHideSpot(3.9, -3, 0x92dcff);
    addHideSpot(-3.4, 5, 0xb8d6ff);
    addHideSpot(4.1, 10, 0xffbde2);

    const collectibles = [];
    const collectPositions = [
      [-2.1, -13], [2.2, -10], [-1.5, -4], [2.4, -1],
      [-2.6, 3], [2.5, 6], [-1.2, 9], [1.8, 12]
    ];

    function createStar() {
      const g = new THREE.Group();
      const core = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.35, 0),
        new THREE.MeshStandardMaterial({ color: 0xfff08d, emissive: 0xb8892f, emissiveIntensity: 0.55 })
      );
      g.add(core);
      return g;
    }

    collectPositions.forEach((p) => {
      const s = createStar();
      s.position.set(p[0], 0.72, p[1]);
      scene.add(s);
      collectibles.push({ mesh: s, collected: false });
    });

    const bounds = { minX: -6, maxX: 6, minZ: -20, maxZ: 17.5 };
    let catStateTimer = 0;

    function setMessage(text, timeout = 1200) {
      msg.textContent = text;
      if (timeout > 0) {
        const stamp = Date.now();
        setTimeout(() => {
          if (Date.now() - stamp >= timeout - 30) msg.textContent = "";
        }, timeout);
      }
    }

    function resetPlayerPosition() {
      player.position.set(0, 0, -18);
      setMessage("見つかった！ スタート地点にもどるよ", 1300);
      state.freezeUntil = performance.now() + 700;
    }

    function setCatSleeping(flag) {
      state.catSleeping = flag;
      statusText.textContent = flag ? "状態: ねむってる（いまがチャンス）" : "状態: 起きてる（かくれて！）";
      const eyeMat = flag ? eyeCloseMat : eyeOpenMat;
      catEyeL.material = eyeMat;
      catEyeR.material = eyeMat;
      visionCone.visible = !flag;
      catStateTimer = flag ? 2.8 + Math.random() * 2.2 : 1.6 + Math.random() * 1.6;
    }

    function resetStage() {
      state.clear = false;
      state.running = true;
      state.collected = 0;
      state.goalOpen = false;
      player.position.set(0, 0, -18);
      collectibles.forEach((c) => {
        c.collected = false;
        c.mesh.visible = true;
      });
      goalRing.visible = false;
      clearOverlay.classList.add("hidden");
      updateHud();
      setCatSleeping(true);
      msg.textContent = "";
    }

    function updateHud() {
      collectText.textContent = `あつめた: ${state.collected}/${state.totalCollectibles}`;
      hideText.textContent = `かくれ: ${state.hidden ? "している" : "していない"}`;
    }

    function isHidden() {
      const px = player.position.x;
      const pz = player.position.z;
      for (const spot of hideSpots) {
        const dx = px - spot.x;
        const dz = pz - spot.z;
        if (dx * dx + dz * dz < spot.radius * spot.radius) return true;
      }
      return false;
    }

    function isSpottedByCat() {
      const toPlayer = new THREE.Vector3(player.position.x - cat.position.x, 0, player.position.z - cat.position.z);
      const dist = toPlayer.length();
      if (dist > 18) return false;
      toPlayer.normalize();
      const catForward = new THREE.Vector3(0, 0, -1);
      const cos = toPlayer.dot(catForward);
      return cos > Math.cos((55 * Math.PI) / 180);
    }

    function openGoalIfNeeded() {
      if (state.goalOpen) return;
      if (state.collected >= state.totalCollectibles) {
        state.goalOpen = true;
        goalRing.visible = true;
        setMessage("ぜんぶ集めた！ ねこの近くのゴールへ！", 1800);
      }
    }

    function checkGoal() {
      if (!state.goalOpen || state.clear) return;
      const dx = player.position.x - goalRing.position.x;
      const dz = player.position.z - goalRing.position.z;
      if (dx * dx + dz * dz < 1.1 * 1.1) {
        state.clear = true;
        state.running = false;
        clearOverlay.classList.remove("hidden");
      }
    }

    function setupInput() {
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") keys.up = true;
        if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") keys.down = true;
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
      });

      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") keys.up = false;
        if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") keys.down = false;
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
      });

      const controls = document.getElementById("touchControls");
      controls.querySelectorAll("button").forEach((btn) => {
        const dir = btn.dataset.dir;
        const down = (ev) => {
          ev.preventDefault();
          keys[dir] = true;
          btn.classList.add("active");
        };
        const up = (ev) => {
          ev.preventDefault();
          keys[dir] = false;
          btn.classList.remove("active");
        };
        btn.addEventListener("pointerdown", down);
        btn.addEventListener("pointerup", up);
        btn.addEventListener("pointercancel", up);
        btn.addEventListener("pointerleave", up);
      });
    }

    document.querySelectorAll("[data-avatar]").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedAvatar = btn.dataset.avatar;
        selectText.textContent = selectedAvatar === "boy" ? "男の子を選択中" : "女の子を選択中";
      });
    });

    startBtn.addEventListener("click", () => {
      if (!selectedAvatar) {
        setMessage("先に主人公をえらんでね", 1200);
        return;
      }

      scene.remove(player);
      player = createAvatar(selectedAvatar);
      scene.add(player);
      player.visible = true;

      startOverlay.classList.add("hidden");
      resetStage();
    });

    retryBtn.addEventListener("click", () => {
      resetStage();
    });

    setupInput();

    const clock = new THREE.Clock();

    function update(dt, t) {
      if (!state.running || t < state.freezeUntil) return;

      catStateTimer -= dt;
      if (catStateTimer <= 0) setCatSleeping(!state.catSleeping);

      const move = new THREE.Vector3();
      if (keys.up) move.z -= 1;
      if (keys.down) move.z += 1;
      if (keys.left) move.x -= 1;
      if (keys.right) move.x += 1;

      if (move.lengthSq() > 0) {
        move.normalize();
        const speed = 4.0;
        player.position.addScaledVector(move, speed * dt);
        player.position.x = Math.max(bounds.minX, Math.min(bounds.maxX, player.position.x));
        player.position.z = Math.max(bounds.minZ, Math.min(bounds.maxZ, player.position.z));
        player.rotation.y = Math.atan2(move.x, move.z);
      }

      state.hidden = isHidden();
      updateHud();

      if (!state.catSleeping && !state.hidden && isSpottedByCat()) {
        resetPlayerPosition();
      }

      collectibles.forEach((c, i) => {
        if (c.collected) return;
        c.mesh.rotation.y += dt * 1.8;
        c.mesh.position.y = 0.72 + Math.sin(t * 0.004 + i) * 0.08;
        const dx = player.position.x - c.mesh.position.x;
        const dz = player.position.z - c.mesh.position.z;
        if (dx * dx + dz * dz < 0.75 * 0.75) {
          c.collected = true;
          c.mesh.visible = false;
          state.collected += 1;
          updateHud();
          openGoalIfNeeded();
        }
      });

      goalRing.rotation.z += dt * 1.6;
      goalRing.position.y = 0.85 + Math.sin(t * 0.004) * 0.13;
      checkGoal();

      const camTarget = new THREE.Vector3(player.position.x, 1.4, player.position.z + 1.0);
      camera.position.lerp(new THREE.Vector3(player.position.x, 6.8, player.position.z - 6.2), 0.08);
      camera.lookAt(camTarget);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);
      const t = performance.now();
      cloudGroup.rotation.y += dt * 0.03;
      update(dt, t);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHud();
    animate();
  </script>
</body>
</html>
