<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>THE GAME マルチ+NPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #fff0f5;
      --bg2: #e6f7ff;
      --ink: #5a3752;
      --panel: rgba(255, 255, 255, 0.78);
      --pink: #ff92c8;
      --blue: #8ed9ff;
      --ok: #6fd6a1;
      --bad: #f07f9d;
      --card: #ffffff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      overflow: hidden;
      font-family: "M PLUS Rounded 1c", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--ink);
    }
    .app {
      width: min(100vw, 620px);
      height: 100vh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom)) 10px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr auto auto;
      gap: 8px;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #fff;
      border-radius: 14px;
      padding: 8px 10px;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .title { font-size: 18px; font-weight: 800; }
    .stats, .players {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 700;
    }
    .chip {
      background: rgba(255,255,255,0.86);
      border-radius: 10px;
      padding: 4px 8px;
    }
    .chip.active { box-shadow: 0 0 0 3px rgba(255,146,200,0.5) inset; }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .actions label { font-size: 13px; font-weight: 700; }
    select {
      border: 2px solid #fff;
      border-radius: 10px;
      background: #fff;
      font: inherit;
      padding: 8px;
      color: var(--ink);
      font-weight: 700;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px;
      font-family: inherit;
      font-weight: 800;
      color: #fff;
      background: var(--pink);
      font-size: 15px;
      box-shadow: 0 3px 0 rgba(134, 82, 112, 0.28);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.12s ease;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 rgba(134, 82, 112, 0.2);
      filter: brightness(0.98);
    }
    button.secondary { background: var(--blue); }
    button:disabled { opacity: 0.45; }
    .touchable {
      position: relative;
      outline: 2px solid rgba(255, 255, 255, 0.95);
      outline-offset: -2px;
    }
    .msg {
      min-height: 42px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }
    .piles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: start;
    }
    .pile {
      background: rgba(255,255,255,0.84);
      border: 2px solid #fff;
      border-radius: 14px;
      min-height: 96px;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 5px;
      box-shadow: 0 3px 0 rgba(126, 95, 115, 0.2);
    }
    .pile h3 { margin: 0; font-size: 12px; font-weight: 800; color: #7b5d72; }
    .pile .value { font-size: 32px; text-align: center; font-weight: 800; line-height: 1; }
    .pile .hint { font-size: 11px; text-align: center; font-weight: 700; color: #8d7687; }
    .pile.valid { box-shadow: 0 0 0 3px rgba(111,214,161,0.65) inset; }
    .pile.up .value { color: #ff7fb9; }
    .pile.down .value { color: #6ec8f9; }
    .hand-wrap { display: grid; gap: 6px; }
    .hand-title { font-size: 13px; font-weight: 800; }
    .hand {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 88px;
      align-content: flex-start;
    }
    .tracker-title { font-size: 13px; font-weight: 800; margin-bottom: 6px; }
    .tracker-grid {
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      gap: 4px;
      max-height: 130px;
      overflow: auto;
      padding-right: 2px;
    }
    .tracker-num {
      height: 24px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #fff;
      font-size: 12px;
      font-weight: 800;
      display: grid;
      place-items: center;
      color: var(--ink);
    }
    .tracker-num.played { background: #d4d2d7; color: #7f7b84; border-color: #d4d2d7; }
    .tracker-num.fixed { background: rgba(142, 217, 255, 0.38); color: #4f6c7d; }
    .card {
      width: calc(25% - 5px);
      min-width: 62px;
      height: 42px;
      background: var(--card);
      border: 2px solid #fff;
      border-radius: 10px;
      font-size: 19px;
      font-weight: 800;
      color: var(--ink);
      display: grid;
      place-items: center;
      box-shadow: 0 2px 0 rgba(126, 95, 115, 0.2);
    }
    .card.selected { box-shadow: 0 0 0 3px rgba(255,146,200,0.7) inset; transform: translateY(-1px); }
    .footer { font-size: 12px; font-weight: 700; text-align: center; color: #8a7184; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel top">
      <div>
        <div class="title">THE GAME（協力: あなた + NPC）</div>
        <div class="stats">
          <div class="chip" id="deckCount">山札: 0</div>
          <div class="chip" id="roundInfo">ラウンド: 1</div>
          <div class="chip" id="turnInfo">手番: あなた</div>
        </div>
      </div>
      <div class="chip" id="playedInfo">この手番で出した: 0 / 最低: 2</div>
    </div>

    <div class="panel players" id="players"></div>

    <div class="panel actions">
      <label>人数
        <select id="playerCount">
          <option value="2">2人（あなた+NPC1）</option>
          <option value="3" selected>3人（あなた+NPC2）</option>
          <option value="4">4人（あなた+NPC3）</option>
        </select>
      </label>
      <button class="touchable" id="endTurnBtn">手番終了</button>
      <button class="secondary touchable" id="newGameBtn">新しく開始</button>
    </div>

    <div class="panel msg" id="message"></div>

    <div class="piles" id="piles"></div>

    <div class="panel hand-wrap">
      <div class="hand-title">あなたの手札（数字を選んでから置き場をタップ）</div>
      <div class="hand" id="hand"></div>
    </div>

    <div class="panel">
      <div class="tracker-title">カードトラッカー（1〜99）</div>
      <div class="tracker-grid" id="cardTracker"></div>
    </div>

    <div class="footer">NPCは少し甘めの判断をします（最適解を外すことがあります）。</div>
  </div>

  <script>
    (() => {
      const pilesDef = [
        { id: 0, type: "up", label: "昇順A", top: 1 },
        { id: 1, type: "up", label: "昇順B", top: 1 },
        { id: 2, type: "down", label: "降順A", top: 100 },
        { id: 3, type: "down", label: "降順B", top: 100 },
      ];

      const state = {
        deck: [],
        piles: [],
        players: [],
        currentPlayer: 0,
        selectedCard: null,
        playsThisTurn: 0,
        round: 1,
        gameOver: false,
        won: false,
        npcBusy: false,
        playedCards: new Set(),
      };

      const el = {
        deckCount: document.getElementById("deckCount"),
        roundInfo: document.getElementById("roundInfo"),
        turnInfo: document.getElementById("turnInfo"),
        playedInfo: document.getElementById("playedInfo"),
        message: document.getElementById("message"),
        hand: document.getElementById("hand"),
        piles: document.getElementById("piles"),
        players: document.getElementById("players"),
        endTurnBtn: document.getElementById("endTurnBtn"),
        newGameBtn: document.getElementById("newGameBtn"),
        playerCount: document.getElementById("playerCount"),
        cardTracker: document.getElementById("cardTracker"),
      };

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
      }

      function handSizeForPlayers(n) {
        if (n <= 1) return 8;
        if (n === 2) return 7;
        return 6;
      }

      function neededPlaysThisTurn() {
        return state.deck.length > 0 ? 2 : 1;
      }

      function canPlayOnPile(card, pile) {
        if (pile.type === "up") return card > pile.top || card === pile.top - 10;
        return card < pile.top || card === pile.top + 10;
      }

      function isReverseMove(card, pile) {
        if (pile.type === "up") return card === pile.top - 10;
        return card === pile.top + 10;
      }

      function moveCost(card, pile) {
        if (isReverseMove(card, pile)) return -12;
        return pile.type === "up" ? card - pile.top : pile.top - card;
      }

      function legalMovesForHand(hand) {
        const moves = [];
        for (let i = 0; i < hand.length; i += 1) {
          const card = hand[i];
          for (let j = 0; j < state.piles.length; j += 1) {
            const pile = state.piles[j];
            if (canPlayOnPile(card, pile)) {
              moves.push({ card, pileId: pile.id, cost: moveCost(card, pile), reverse: isReverseMove(card, pile) });
            }
          }
        }
        return moves;
      }

      function hasAnyMoveForHand(hand) {
        return legalMovesForHand(hand).length > 0;
      }

      function drawToPlayer(player) {
        const handSize = handSizeForPlayers(state.players.length);
        while (player.hand.length < handSize && state.deck.length > 0) {
          player.hand.push(state.deck.pop());
        }
        player.hand.sort((a, b) => a - b);
      }

      function drawToAllPlayers() {
        for (let i = 0; i < state.players.length; i += 1) drawToPlayer(state.players[i]);
      }

      function setMessage(text, good = false, bad = false) {
        el.message.textContent = text;
        el.message.style.color = bad ? "var(--bad)" : (good ? "var(--ok)" : "var(--ink)");
      }

      function currentPlayerObj() {
        return state.players[state.currentPlayer];
      }

      function applyMove(player, card, pileId) {
        const pile = state.piles.find((p) => p.id === pileId);
        if (!pile || !canPlayOnPile(card, pile)) return false;
        const idx = player.hand.indexOf(card);
        if (idx < 0) return false;
        player.hand.splice(idx, 1);
        pile.top = card;
        state.playedCards.add(card);
        state.playsThisTurn += 1;
        return true;
      }

      function maybeGameOverAfterAction() {
        const allHandsEmpty = state.players.every((p) => p.hand.length === 0);
        if (state.deck.length === 0 && allHandsEmpty) {
          state.gameOver = true;
          state.won = true;
          setMessage("98枚すべて出し切り成功！クリアです。", true, false);
          render();
          return true;
        }
        return false;
      }

      function canEndTurnNow(player) {
        const need = neededPlaysThisTurn();
        if (state.playsThisTurn < need) return false;
        if (state.gameOver) return false;
        if (state.deck.length === 0 && player.hand.length === 0) return true;
        return true;
      }

      function advanceTurn() {
        const player = currentPlayerObj();
        drawToPlayer(player);

        state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
        if (state.currentPlayer === 0) state.round += 1;
        state.playsThisTurn = 0;
        state.selectedCard = null;

        const next = currentPlayerObj();
        if (!hasAnyMoveForHand(next.hand)) {
          state.gameOver = true;
          setMessage(next.name + " の手番で出せる手がありません。ゲーム終了。", false, true);
        } else {
          setMessage(next.name + " の手番です。");
        }

        render();
        if (!state.gameOver && next.isNpc) startNpcTurn();
      }

      function endTurnByHuman() {
        if (state.gameOver || state.npcBusy) return;
        const player = currentPlayerObj();
        if (player.isNpc) return;
        const need = neededPlaysThisTurn();
        if (state.playsThisTurn < need) {
          setMessage("この手番は最低 " + need + " 枚必要です。", false, true);
          return;
        }
        advanceTurn();
      }

      function selectCard(card) {
        if (state.gameOver || state.npcBusy) return;
        const p = currentPlayerObj();
        if (p.isNpc) return;
        state.selectedCard = state.selectedCard === card ? null : card;
        render();
      }

      function tryPlayToPileByHuman(pileId) {
        if (state.gameOver || state.npcBusy) return;
        const player = currentPlayerObj();
        if (player.isNpc) return;
        if (state.selectedCard == null) {
          setMessage("先に手札のカードを選んでください。");
          return;
        }
        if (!applyMove(player, state.selectedCard, pileId)) {
          setMessage("その置き場には出せません。");
          return;
        }
        state.selectedCard = null;

        if (maybeGameOverAfterAction()) return;

        const need = neededPlaysThisTurn();
        if (!hasAnyMoveForHand(player.hand)) {
          if (state.playsThisTurn >= need) {
            setMessage("最低枚数は達成。手番終了してください。", true, false);
          } else {
            state.gameOver = true;
            setMessage("必要枚数を満たせず、出せる手がありません。ゲーム終了。", false, true);
          }
        } else {
          setMessage("カードを出しました。続けて出すか手番終了してください。");
        }
        render();
      }

      function pickNpcMove(moves, needSatisfied) {
        const sorted = moves.slice().sort((a, b) => a.cost - b.cost);
        const reverseMoves = sorted.filter((m) => m.reverse);
        const veryLowDiffMoves = sorted.filter((m) => !m.reverse && m.cost >= 1 && m.cost <= 5);
        const lowDiffMoves = sorted.filter((m) => !m.reverse && m.cost >= 6 && m.cost <= 10);

        if (reverseMoves.length > 0) return reverseMoves[0];
        if (veryLowDiffMoves.length > 0) return veryLowDiffMoves[0];
        if (!needSatisfied && lowDiffMoves.length > 0) return lowDiffMoves[0];
        if (!needSatisfied && sorted.length > 0) return sorted[0];
        return null;
      }

      function startNpcTurn() {
        if (state.gameOver) return;
        const npc = currentPlayerObj();
        if (!npc || !npc.isNpc) return;

        state.npcBusy = true;
        render();

        const step = () => {
          if (state.gameOver) {
            state.npcBusy = false;
            render();
            return;
          }

          const need = neededPlaysThisTurn();
          const moves = legalMovesForHand(npc.hand);
          if (moves.length === 0) {
            if (state.playsThisTurn >= need) {
              state.npcBusy = false;
              setMessage(npc.name + " は手番を終了しました。", true, false);
              advanceTurn();
            } else {
              state.gameOver = true;
              state.npcBusy = false;
              setMessage(npc.name + " が必要枚数を満たせず終了。ゲームオーバー。", false, true);
              render();
            }
            return;
          }

          const choice = pickNpcMove(moves, state.playsThisTurn >= need);
          if (!choice) {
            state.npcBusy = false;
            setMessage(npc.name + " は良い手がないため手番を終了しました。", true, false);
            advanceTurn();
            return;
          }

          applyMove(npc, choice.card, choice.pileId);
          setMessage(npc.name + " が " + choice.card + " を出しました。");

          if (maybeGameOverAfterAction()) {
            state.npcBusy = false;
            render();
            return;
          }

          render();
          setTimeout(step, 420);
        };

        setTimeout(step, 420);
      }

      function renderPiles() {
        el.piles.innerHTML = "";
        const current = currentPlayerObj();
        const selected = !current.isNpc ? state.selectedCard : null;
        for (let i = 0; i < state.piles.length; i += 1) {
          const pile = state.piles[i];
          const icon = pile.type === "up" ? "↑" : "↓";
          const btn = document.createElement("button");
          btn.className = "pile touchable " + pile.type;
          if (selected != null && canPlayOnPile(selected, pile)) btn.classList.add("valid");
          btn.innerHTML =
            "<h3>" + pile.label + icon + "</h3>" +
            "<div class='value'>" + pile.top + "</div>" +
            "<div class='hint'>" + (pile.type === "up" ? "大きい数字 or -10" : "小さい数字 or +10") + "</div>";
          btn.onclick = () => tryPlayToPileByHuman(pile.id);
          el.piles.appendChild(btn);
        }
      }

      function renderHand() {
        el.hand.innerHTML = "";
        const player = currentPlayerObj();
        if (player.isNpc) {
          const p = document.createElement("div");
          p.className = "chip";
          p.textContent = "NPC手番中...";
          el.hand.appendChild(p);
          return;
        }

        for (let i = 0; i < player.hand.length; i += 1) {
          const card = player.hand[i];
          const btn = document.createElement("button");
          btn.className = "card touchable" + (state.selectedCard === card ? " selected" : "");
          btn.textContent = String(card);
          btn.onclick = () => selectCard(card);
          el.hand.appendChild(btn);
        }
      }

      function renderPlayers() {
        el.players.innerHTML = "";
        for (let i = 0; i < state.players.length; i += 1) {
          const p = state.players[i];
          const div = document.createElement("div");
          div.className = "chip" + (i === state.currentPlayer ? " active" : "");
          div.textContent = p.name + " 手札:" + p.hand.length;
          el.players.appendChild(div);
        }
      }

      function renderTracker() {
        el.cardTracker.innerHTML = "";
        for (let n = 1; n <= 99; n += 1) {
          const cell = document.createElement("div");
          cell.className = "tracker-num";
          if (n === 1) {
            cell.classList.add("fixed");
          } else if (state.playedCards.has(n)) {
            cell.classList.add("played");
          }
          cell.textContent = String(n);
          el.cardTracker.appendChild(cell);
        }
      }

      function render() {
        const current = currentPlayerObj();
        const need = neededPlaysThisTurn();

        el.deckCount.textContent = "山札: " + state.deck.length;
        el.roundInfo.textContent = "ラウンド: " + state.round;
        el.turnInfo.textContent = "手番: " + current.name;
        el.playedInfo.textContent = "この手番で出した: " + state.playsThisTurn + " / 最低: " + need;

        el.endTurnBtn.disabled =
          state.gameOver || state.npcBusy || current.isNpc || !canEndTurnNow(current);
        el.playerCount.disabled = state.npcBusy;

        renderPlayers();
        renderPiles();
        renderHand();
        renderTracker();
      }

      function startNewGame() {
        const count = Number(el.playerCount.value);

        state.deck = [];
        for (let n = 2; n <= 99; n += 1) state.deck.push(n);
        shuffle(state.deck);

        state.piles = pilesDef.map((p) => ({ ...p }));
        state.players = [{ name: "あなた", isNpc: false, hand: [] }];
        for (let i = 1; i < count; i += 1) {
          state.players.push({ name: "NPC" + i, isNpc: true, hand: [] });
        }

        drawToAllPlayers();

        state.currentPlayer = 0;
        state.selectedCard = null;
        state.playsThisTurn = 0;
        state.round = 1;
        state.gameOver = false;
        state.won = false;
        state.npcBusy = false;
        state.playedCards = new Set();

        if (!hasAnyMoveForHand(currentPlayerObj().hand)) {
          state.gameOver = true;
          setMessage("開始時点で出せる手がありません。", false, true);
        } else {
          setMessage("ゲーム開始。あなたの手番です。最低2枚を目安に協力してください。");
        }
        render();
      }

      el.endTurnBtn.addEventListener("click", endTurnByHuman);
      el.newGameBtn.addEventListener("click", startNewGame);
      startNewGame();
    })();
  </script>
</body>
</html>
