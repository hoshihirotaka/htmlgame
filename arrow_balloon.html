<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>弓矢バルーンサバイバル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }
    body {
      background: #FFF0F5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    #game-container {
      position: relative;
    }
  </style>
</head>
<body>
<div id="game-container"></div>

<script>
// ============================================================
//  弓矢バルーンサバイバル
//  仕様書: arrow_balloon_spec.md 参照
//  開発フェーズ: Phase 1（コアサイクル）
// ============================================================

// ---- 定数 ----
const GAME_W = 390;   // 画面幅（モバイル基準）
const GAME_H = 844;   // 画面高さ（モバイル基準）
const WALL_W = 16;    // 壁の幅
const ARROW_SPEED_BASE = 800;   // 発射速度基準
const ARROW_MAX_DRAG  = 120;    // 引っ張りの最大距離（px）
const ARROW_RANGE_MAX = 1200;   // 最大飛距離
const ARROW_RANGE_EXP = 1.5;    // 弱い引きで飛距離を短くする補正
const SPECIAL_ARROW_INTERVAL = 3; // 特殊矢の出現間隔
const BALLOON_MOVE_SPEED_MIN = 0.0012; // 移動風船の最小速度
const BALLOON_MOVE_SPEED_MAX = 0.0022; // 移動風船の最大速度
const WIND_STRENGTH_WEAK = 0.16;  // 風の弱補正
const WIND_STRENGTH_MID = 0.24;   // 風の中補正
const WIND_STRENGTH_STRONG = 0.34; // 風の強補正
const WIND_ZONE_LAYOUT_STAGE1 = [
  { xRate: 0.28, yOffset: -220, dirX: 1, strength: WIND_STRENGTH_WEAK, key: 'wind_mark_weak', label: '右風・弱' },
  { xRate: 0.72, yOffset: -520, dirX: -1, strength: WIND_STRENGTH_MID, key: 'wind_mark_mid', label: '左風・中' },
  { xRate: 0.32, yOffset: -900, dirX: 1, strength: WIND_STRENGTH_STRONG, key: 'wind_mark_strong', label: '右風・強' }
];
const WIND_ZONE_LAYOUT_STAGE2 = [
  { xRate: 0.50, yOffset: -124, dirX: 1, strength: WIND_STRENGTH_WEAK, key: 'wind_mark_weak', label: '右風・弱' },
  { xRate: 0.40, yOffset: -1024, dirX: -1, strength: WIND_STRENGTH_MID, key: 'wind_mark_mid', label: '左風・中' },
  { xRate: 0.55, yOffset: -2074, dirX: 1, strength: WIND_STRENGTH_STRONG, key: 'wind_mark_strong', label: '右風・強' }
];
const WIND_ZONE_LAYOUT_STAGE3 = [
  { xRate: 0.30, yOffset: -274, dirX: 1, strength: WIND_STRENGTH_STRONG, key: 'wind_mark_strong', label: '右風・強' },
  { xRate: 0.70, yOffset: -1124, dirX: -1, strength: WIND_STRENGTH_STRONG, key: 'wind_mark_strong', label: '左風・強' },
  { xRate: 0.30, yOffset: -1824, dirX: 1, strength: WIND_STRENGTH_MID, key: 'wind_mark_mid', label: '右風・中' },
  { xRate: 0.70, yOffset: -3224, dirX: -1, strength: WIND_STRENGTH_MID, key: 'wind_mark_mid', label: '左風・中' }
];
const STAGE_COUNT = 3;
const STAGE_CONFIGS = [
  { name: 'はじまりの森', depth: 5900 },
  { name: 'かぜの回廊', depth: 3700 },
  { name: 'よるぞらの塔', depth: 4300 }
];
const INITIAL_ARROWS  = 7;      // 初期矢の本数
const MAX_ARROWS = 9;           // 最大矢ストック
const WORLD_HEIGHT    = 6000;   // スクロール可能な世界の高さ
const ENABLE_DEBUG_UI = false;  // デバッグUI表示フラグ
const SHOW_DEBUG_HITBOX = false; // 当たり判定の可視化
const DEBUG_HITBOX_STORAGE_KEY = 'arrow_balloon_debug_hitbox';

// ============================================================
//  BootScene: アセット生成（テクスチャをコードで描画）
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  preload() {
    // テクスチャをすべてGraphicsで生成（外部アセット不要）
    this.createArrowTexture();
    this.createWoodTexture();
    this.createWoodPadTexture();
    this.createBalloonTexture();
    this.createRecoverBalloonTexture();
    this.createWarpBalloonTexture();
    this.createGoalTexture();
    this.createWindTexture();
    this.createWallTexture();
  }

  // 矢テクスチャ（先端が右向き、原点=先端）
  createArrowTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const w = 60, h = 12;
    // 矢の軸
    g.fillStyle(0x8B4513);
    g.fillRect(0, h / 2 - 2, w - 16, 4);
    // 矢じり（三角）
    g.fillStyle(0xC0C0C0);
    g.fillTriangle(w - 16, 0, w, h / 2, w - 16, h);
    // 矢羽
    g.fillStyle(0xFF6B9D);
    g.fillTriangle(0, h / 2, 12, 0, 12, h / 2);
    g.fillTriangle(0, h / 2, 12, h, 12, h / 2);
    g.generateTexture('arrow', w, h);
    g.destroy();
  }

  // 木オブジェクトテクスチャ（丸みのある横長の台）
  createWoodTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const w = 100, h = 40, r = 12;
    // 影
    g.fillStyle(0xC87941, 0.3);
    g.fillRoundedRect(4, 4, w, h, r);
    // 本体
    g.fillStyle(0xDEB887);
    g.fillRoundedRect(0, 0, w, h, r);
    // 木目線
    g.lineStyle(1.5, 0xC4A265, 0.5);
    g.beginPath();
    g.moveTo(20, 8);  g.lineTo(18, 32);
    g.moveTo(40, 6);  g.lineTo(38, 34);
    g.moveTo(60, 8);  g.lineTo(62, 32);
    g.moveTo(80, 6);  g.lineTo(78, 34);
    g.strokePath();
    g.generateTexture('wood', w + 4, h + 4);
    g.destroy();
  }

  createWoodPadTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    g.fillStyle(0xffffff, 1);
    g.fillRect(0, 0, 8, 8);
    g.generateTexture('wood_pad', 8, 8);
    g.destroy();
  }

  // 風船テクスチャ（円形＋矢マーク）
  createBalloonTexture() {
    const colors = [0xFF6B9D, 0xFFB347, 0x87CEEB, 0x98FB98, 0xDDA0DD];
    colors.forEach((color, i) => {
      const g = this.make.graphics({ x: 0, y: 0, add: false });
      const r = 36;
      // 光沢
      g.fillStyle(color, 0.9);
      g.fillCircle(r, r, r);
      g.fillStyle(0xFFFFFF, 0.35);
      g.fillEllipse(r - 10, r - 12, 18, 12);
      // 縦糸
      g.lineStyle(2, 0xAAAAAA);
      g.beginPath();
      g.moveTo(r, r * 2);
      g.lineTo(r, r * 2 + 20);
      g.strokePath();
      g.generateTexture(`balloon_${i}`, r * 2, r * 2 + 20);
      g.destroy();
    });
  }

  createWarpBalloonTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const r = 36;
    g.fillStyle(0x8c9eff, 0.92);
    g.fillCircle(r, r, r);
    g.lineStyle(4, 0xffffff, 0.9);
    g.strokeCircle(r, r, 22);
    g.lineStyle(3, 0x5c6bc0, 0.75);
    g.strokeCircle(r, r, 30);
    // 紐なしなので正円サイズで生成（中心座標ズレを防ぐ）
    g.generateTexture('balloon_warp', r * 2, r * 2);
    g.destroy();
  }

  createRecoverBalloonTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const r = 36;
    g.fillStyle(0x9ccc65, 0.95);
    g.fillCircle(r, r, r);
    g.fillStyle(0xffffff, 0.35);
    g.fillEllipse(r - 10, r - 12, 18, 12);
    g.lineStyle(4, 0xffffff, 0.9);
    g.strokeCircle(r, r, 23);
    g.generateTexture('balloon_recover', r * 2, r * 2 + 20);
    g.destroy();
  }

  createGoalTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    const w = 78, h = 92;
    // ポール
    g.fillStyle(0xf5f5f5, 1);
    g.fillRect(10, 8, 8, 78);
    // 旗
    g.fillStyle(0xff6b9d, 0.95);
    g.fillTriangle(18, 16, 60, 28, 18, 40);
    // 星
    g.fillStyle(0xfff59d, 0.95);
    g.fillCircle(28, 28, 5);
    // 台座
    g.fillStyle(0xde9f66, 0.95);
    g.fillRoundedRect(0, 84, 28, 8, 3);
    g.generateTexture('goal_marker', w, h);
    g.destroy();
  }

  createWindTexture() {
    const makeWindMark = (key, lineCount) => {
      const g = this.make.graphics({ x: 0, y: 0, add: false });
      const w = 108, h = 64;
      g.fillStyle(0xffffff, 0.12);
      g.fillEllipse(54, 32, 92, 50);

      // 風の本線: 線の本数で強さを表現
      g.lineStyle(4, 0x37474f, 0.86);
      const drawWave = (startX, startY, length, amp, step) => {
        g.beginPath();
        g.moveTo(startX, startY);
        for (let x = startX + step; x <= startX + length; x += step) {
          const y = startY + Math.sin((x - startX) * 0.22) * amp;
          g.lineTo(x, y);
        }
        g.strokePath();
      };
      const topY = 18;
      for (let i = 0; i < lineCount; i++) {
        drawWave(14 + i * 2, topY + i * 11, 66 - i * 3, 4.2 - i * 0.3, 4);
      }

      // 進行方向を示す先端ストローク
      g.lineStyle(3, 0x37474f, 0.9);
      g.beginPath();
      g.moveTo(82, 20); g.lineTo(94, 16);
      g.moveTo(84, 31); g.lineTo(97, 31);
      g.moveTo(82, 42); g.lineTo(94, 46);
      g.strokePath();

      g.generateTexture(key, w, h);
      g.destroy();
    };

    makeWindMark('wind_mark_weak', 2);
    makeWindMark('wind_mark_mid', 3);
    makeWindMark('wind_mark_strong', 4);
  }

  // 壁テクスチャ
  createWallTexture() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    g.fillStyle(0xFFB7C5);
    g.fillRect(0, 0, WALL_W, 64);
    // ドット模様
    g.fillStyle(0xFFFFFF, 0.4);
    for (let y = 4; y < 64; y += 16) {
      g.fillCircle(WALL_W / 2, y, 3);
    }
    g.generateTexture('wall', WALL_W, 64);
    g.destroy();
  }

  create() {
    this.scene.start('Game');
  }
}

// ============================================================
//  GameScene: メインゲーム
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.stageIndex = data?.stageIndex || 1;
    this.carriedScore = typeof data?.score === 'number' ? data.score : 0;
    this.carriedArrows = typeof data?.arrowCount === 'number' ? data.arrowCount : INITIAL_ARROWS;
  }

  create() {
    // ---- 世界の設定 ----
    this.physics.world.setBounds(0, -WORLD_HEIGHT + GAME_H, GAME_W, WORLD_HEIGHT);
    this.cameras.main.setBounds(0, -WORLD_HEIGHT + GAME_H, GAME_W, WORLD_HEIGHT);

    // ---- ゲーム状態 ----
    this.arrowCount = this.carriedArrows; // 残り矢の本数
    this.score      = this.carriedScore;
    this.isFlying   = false;          // 矢が飛行中か
    this.isFalling  = false;          // 飛距離切れで落下中か
    this.isDragging = false;          // スワイプ引っ張り中か
    this.dragStart  = { x: 0, y: 0 };
    this.flightDistanceLeft = 0;      // 残り飛距離
    this.fallStartY = 0;              // 落下開始時のY
    this.stageStartY = 0;             // ステージ開始位置のY
    this.arrowColliders = [];         // 矢に紐づく衝突判定
    this.woodSpawnIndex = 0;          // 木バリエーションの固定シーケンス用
    this.arrowTypeText = null;        // シーン再開始時の破棄済み参照をクリア
    this.debugToggleBtn = null;
    this.debugNextStageBtn = null;
    this.debugPanelText = null;
    this.nextWoodId = 1;
    this.nextBalloonId = 1;
    this.nextWindId = 1;
    this.debugObjectLabels = [];
    this.debugScreenTexts = [];
    this.shotsFired = 0;              // 発射済み本数
    this.currentArrowType = 'normal'; // 現在の矢タイプ
    this.currentArrowConfig = null;
    this.lastWarpAt = -99999;         // 最終ワープ時刻(ms)
    this.warpIgnorePairId = null;     // 連続ワープ抑止用ペアID
    this.warpIgnoreUntil = 0;         // 連続ワープ抑止終了時刻(ms)
    this.warpStabilizeUntil = 0;      // ワープ後の挙動安定化
    this.arrowTypeConfigMap = {
      normal: { label: 'ノーマル', speedMul: 1.0, rangeMul: 1.0, windMul: 1.0, uiColor: '#FF6B9D' },
      boost:  { label: 'ブースト', speedMul: 1.22, rangeMul: 1.18, windMul: 0.9, uiColor: '#FF8F00' }
    };
    const savedDebug = localStorage.getItem(DEBUG_HITBOX_STORAGE_KEY);
    this.showDebugHitbox = ENABLE_DEBUG_UI && (savedDebug === null ? SHOW_DEBUG_HITBOX : savedDebug === '1');

    // ---- 壁生成 ----
    this.createWalls();

    // ---- 木オブジェクト生成（初期配置） ----
    this.woodGroup = this.physics.add.staticGroup();
    this.woodColliderGroup = this.physics.add.staticGroup();
    this.createInitialWoods();

    // ---- 風ギミック ----
    this.windGroup = this.physics.add.staticGroup();
    this.createWinds();

    // ---- 風船生成 ----
    this.balloonGroup = this.physics.add.group({
      allowGravity: false,
      immovable: true
    });
    this.movingBalloons = [];
    this.warpPairs = [];
    this.createBalloons();
    this.createGoalMarker();

    // ---- 矢の生成（最初の発射台から） ----
    const firstWood = this.woodGroup.getChildren()[0];
    this.currentAnchor = { x: firstWood.x, y: firstWood.y }; // 次の発射基準点
    this.stageStartY = firstWood.y - 28;
    this.arrow = null;
    this.spawnArrow();

    // ---- カメラ設定 ----
    this.cameras.main.startFollow(this.arrow, true, 0.1, 0.1);
    this.cameras.main.setFollowOffset(0, GAME_H * 0.3); // 矢を画面下寄りに

    // ---- UI（固定レイヤー） ----
    this.createUI();
    this.showStageBanner(`STAGE ${this.stageIndex}`, STAGE_CONFIGS[this.stageIndex - 1]?.name || '');

    // ---- タッチ入力 ----
    this.setupInput();

    // ---- ドラッグ表示用Graphics ----
    this.dragGraphics = this.add.graphics();
    this.dragGraphics.setDepth(10);
    this.dragGraphics.setScrollFactor(0);

    // ---- デバッグ表示 ----
    if (ENABLE_DEBUG_UI) {
      this.createDebugToggleUI();
      this.hitboxGraphics = this.add.graphics();
      this.hitboxGraphics.setDepth(30);
      this.debugScreenGraphics = this.add.graphics();
      this.debugScreenGraphics.setDepth(31);
      this.createDebugScreenGuides();
      this.rebuildDebugObjectLabels();
      this.createDebugPanel();
      this.setDebugOverlayVisible(this.showDebugHitbox);
    }
  }

  // ---- 壁生成 ----
  createWalls() {
    this.walls = this.physics.add.staticGroup();
    const tileH = 64;
    const numTiles = Math.ceil(WORLD_HEIGHT / tileH) + 2;
    for (let i = 0; i < numTiles; i++) {
      const y = -WORLD_HEIGHT + GAME_H + i * tileH;
      // 左壁
      const wL = this.walls.create(WALL_W / 2, y, 'wall');
      wL.setImmovable(true);
      // 右壁
      const wR = this.walls.create(GAME_W - WALL_W / 2, y, 'wall');
      wR.setImmovable(true);
    }
  }

  // ---- 木オブジェクト初期配置 ----
  createInitialWoods() {
    if (this.stageIndex === 2) {
      this.createStage2Woods();
      return;
    }
    if (this.stageIndex === 3) {
      this.createStage3Woods();
      return;
    }

    const startY = GAME_H - 100;
    const stageDepth = STAGE_CONFIGS[this.stageIndex - 1]?.depth || STAGE_CONFIGS[0].depth;
    const topLimit = this.stageIndex === 1
      ? (-WORLD_HEIGHT + GAME_H + 120) // Stage1は旧配置（フル長さ）
      : (startY - stageDepth);
    const totalSpan = startY - topLimit;
    const screenCount = Math.ceil(totalSpan / GAME_H);
    this.woodPath = [];

    const addPathWood = (x, y, variant = null) => {
      if (y < topLimit) return;
      const clampedX = Phaser.Math.Clamp(x, 66, GAME_W - 66);
      const wood = this.addWood(clampedX, y, variant);
      this.woodPath.push({ x: clampedX, y, wood });
    };

    // 最初の台（画面下部中央）
    addPathWood(GAME_W / 2, startY, { sx: 1.0, sy: 1.0 });

    // 1画面あたり1〜2本。奇数スクリーンは2本、偶数は1本にして学習→判断の流れを作る
    for (let s = 0; s < screenCount; s++) {
      const screenBottom = startY - s * GAME_H;
      const screenTop = screenBottom - GAME_H;
      const leftX = GAME_W * 0.24;
      const midX = GAME_W * 0.5;
      const rightX = GAME_W * 0.76;
      const primaryX = (s % 2 === 0) ? leftX : rightX;
      const secondaryX = (s % 2 === 0) ? rightX : leftX;

      const y1 = screenBottom - GAME_H * 0.34;
      const y2 = screenBottom - GAME_H * 0.68;

      addPathWood(primaryX, y1);
      if (s % 2 === 1) {
        addPathWood(secondaryX, y2);
      } else if (s % 4 === 0) {
        // ときどき中央の補助足場を追加してルート自由度を上げる
        addPathWood(midX, y2, { sx: 0.92, sy: 1.15 });
      }

      if (screenTop < topLimit) break;
    }

    const last = this.woodPath[this.woodPath.length - 1];
    this.goalWood = last ? last.wood : null;
  }

  createStage2Woods() {
    // かぜの回廊: ジグザグ配置、風との対話を学ぶステージ
    // 12台、最短6着地（7矢で1本余裕）、安全ルートでも回復風船込みでクリア可能
    this.woodPath = [];
    const layout = [
      { x: GAME_W / 2, y: GAME_H - 100, v: { sx: 1.0, sy: 1.0 } }, // W0: 中央スタート
      { x: 100, y: 440 },    // W1: 左
      { x: 300, y: 160 },    // W2: 右、クロスショット
      { x: 130, y: -130 },   // W3: 左寄り
      { x: 270, y: -440 },   // W4: 右、風ゾーン付近
      { x: 100, y: -780 },   // W5: 左端、壁反射チャンス
      { x: 290, y: -1120 },  // W6: 右端
      { x: 160, y: -1480 },  // W7: 中央左
      { x: 310, y: -1820 },  // W8: 右端
      { x: 100, y: -2140 },  // W9: 左端
      { x: 250, y: -2500 },  // W10: 右寄り
      { x: 180, y: -2860 },  // W11: 中央、ゴール
    ];
    layout.forEach((pos, i) => {
      const clampedX = Phaser.Math.Clamp(pos.x, 66, GAME_W - 66);
      const wood = this.addWood(clampedX, pos.y, pos.v || null);
      this.woodPath.push({ x: clampedX, y: pos.y, wood });
    });
    this.goalWood = this.woodPath[this.woodPath.length - 1]?.wood || null;
  }

  createStage3Woods() {
    // よるぞらの塔: 左右に大きく振るジグザグ、精密射撃が求められる最終ステージ
    // 13台、最短6着地（7矢でギリギリ）、風の影響が強い
    this.woodPath = [];
    const layout = [
      { x: GAME_W / 2, y: GAME_H - 100, v: { sx: 1.0, sy: 1.0 } }, // W0: 中央スタート
      { x: 80, y: 420 },     // W1: 左端
      { x: 310, y: 110 },    // W2: 右端、長い対角線
      { x: 195, y: -200 },   // W3: 中央、休憩地点
      { x: 80, y: -540 },    // W4: 左端
      { x: 310, y: -880 },   // W5: 右端
      { x: 195, y: -1220 },  // W6: 中央、休憩地点
      { x: 80, y: -1600 },   // W7: 左端、大きめの隙間
      { x: 310, y: -1960 },  // W8: 右端
      { x: 195, y: -2300 },  // W9: 中央
      { x: 80, y: -2680 },   // W10: 左端、大きめの隙間
      { x: 310, y: -3060 },  // W11: 右端
      { x: 195, y: -3400 },  // W12: 中央、ゴール
    ];
    layout.forEach((pos, i) => {
      const clampedX = Phaser.Math.Clamp(pos.x, 66, GAME_W - 66);
      const wood = this.addWood(clampedX, pos.y, pos.v || null);
      this.woodPath.push({ x: clampedX, y: pos.y, wood });
    });
    this.goalWood = this.woodPath[this.woodPath.length - 1]?.wood || null;
  }

  addWood(x, y, variant = null) {
    const variants = [
      { sx: 1.2,  sy: 0.95 }, // 横長
      { sx: 1.0,  sy: 1.0  }, // 標準
      { sx: 0.78, sy: 1.75 }, // 縦長寄り
      { sx: 0.84, sy: 1.95 }, // 正方形寄り
      { sx: 0.92, sy: 1.15 }, // 小さめ
    ];
    const v = variant || variants[this.woodSpawnIndex % variants.length];
    this.woodSpawnIndex++;
    const wood = this.woodGroup.create(x, y, 'wood');
    wood.debugId = `W${String(this.nextWoodId++).padStart(3, '0')}`;
    wood.setAngle(0);
    wood.setScale(v.sx, v.sy);
    wood.setImmovable(true);
    wood.refreshBody();

    // 当たり判定は別オブジェクトで管理
    const collider = this.woodColliderGroup.create(x, y, 'wood_pad');
    collider.setVisible(false);
    collider.setImmovable(true);
    collider.refreshBody();
    const displayW = 104 * v.sx;
    const displayH = 44 * v.sy;
    const hitW = Math.round(displayW);
    const hitH = Math.round(displayH * 0.5);
    collider.body.setSize(hitW, hitH, true);
    // 画像の上端に揃えて、下側の判定を削る
    collider.body.position.x = wood.x - hitW / 2;
    collider.body.position.y = wood.y - displayH / 2;
    wood.landingCollider = collider;
    collider.parentWood = wood;
    wood.debugLabel = this.createDebugObjectLabel(wood, wood.debugId, -40, '#00C853');
    return wood;
  }

  // ---- 風船配置 ----
  createBalloons() {
    if (this.stageIndex === 2) {
      this.createStage2Balloons();
      return;
    }
    if (this.stageIndex === 3) {
      this.createStage3Balloons();
      return;
    }

    const routePoints = [10, 15, 20]; // 連続導線は低め
    const bonusPoints = [50, 70];     // 単体配置は高め
    const path = this.woodPath || [];
    if (path.length < 2) return;

    const startY = path[0].y;
    const endY = path[path.length - 1].y;
    const total = Math.max(1, startY - endY);
    let pointIdx = 0;
    const recoverPlacedScreens = new Set();

    // 木→木の間に連続配置。進行率で難易度を上げる
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i];
      const b = path[i + 1];
      const progress = Phaser.Math.Clamp((startY - a.y) / total, 0, 1);
      const segDx = b.x - a.x;
      const absDx = Math.abs(segDx);
      const phase = progress < 0.10 ? 'tutorial' : progress < 0.50 ? 'mid' : 'late';
      const centerY = (a.y + b.y) * 0.5;
      const screenIdx = Math.max(0, Math.floor((startY - centerY) / GAME_H));

      // 基本ルート: 足場間に3連配置（序盤は固定で規則的）
      const counts = phase === 'tutorial' ? 3 : 4;
      for (let k = 1; k <= counts; k++) {
        const t = k / (counts + 1);
        const x = Phaser.Math.Linear(a.x, b.x, t);
        const y = Phaser.Math.Linear(a.y, b.y, t) - (phase === 'tutorial' ? 18 : 22);
        let moveType = 'fixed';
        if (phase === 'mid' && k >= 3) moveType = (k % 2 === 0) ? 'updown' : 'fixed';
        if (phase === 'late') moveType = (k % 2 === 0) ? 'leftright' : 'updown';
        this.addBalloon(x, y, routePoints[(pointIdx + k) % routePoints.length], moveType);
        pointIdx++;
      }

      // 直線になりすぎる区間は、壁反射誘導のサブ風船を追加
      if (phase !== 'tutorial' && absDx < 46 && i % 2 === 0) {
        const wallX = (a.x < GAME_W * 0.5) ? GAME_W - 56 : 56;
        const wallY = (a.y + b.y) * 0.5 - 40;
        this.addBalloon(wallX, wallY, bonusPoints[(i / 2) % bonusPoints.length], phase === 'mid' ? 'fixed' : 'leftright');
        pointIdx++;
      }

      // 単体高得点風船（離れた位置の判断報酬）
      if (phase === 'mid' && i % 7 === 3) {
        const bx = (b.x < GAME_W * 0.5) ? GAME_W * 0.82 : GAME_W * 0.18;
        const by = (a.y + b.y) * 0.5 - 90;
        this.addBalloon(bx, by, bonusPoints[i % bonusPoints.length], 'fixed');
      }
      if (phase === 'late' && i % 6 === 2) {
        const bx = (b.x < GAME_W * 0.5) ? GAME_W * 0.88 : GAME_W * 0.12;
        const by = (a.y + b.y) * 0.5 - 100;
        this.addBalloon(bx, by, bonusPoints[(i + 1) % bonusPoints.length], 'updown');
      }

      // 回復風船: ほぼ1画面に1個（進行不能を防ぐ）
      if (!recoverPlacedScreens.has(screenIdx)) {
        let rx = Phaser.Math.Clamp((a.x + b.x) * 0.5, 82, GAME_W - 82);
        let ry = centerY - 30;
        let moveType = 'fixed';
        if (phase === 'mid') {
          rx = (b.x < GAME_W * 0.5) ? GAME_W * 0.74 : GAME_W * 0.26;
        }
        if (phase === 'late') {
          rx = (b.x < GAME_W * 0.5) ? GAME_W * 0.80 : GAME_W * 0.20;
          moveType = 'updown';
        }
        this.addBalloon(rx, ry, 0, moveType, { kind: 'recover' });
        recoverPlacedScreens.add(screenIdx);
      }
    }

    // ワープ風船は一旦無効化（挙動調査まで保留）
    // this.addWarpPair('A', GAME_W * 0.24, GAME_H - 300, GAME_W * 0.76, GAME_H - 460);
    // this.drawWarpGuides();
  }

  createStage2Balloons() {
    const points = [15, 20, 25];
    const bonus = [50, 70];
    const path = this.woodPath || [];
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i + 1];
      const yMid = (a.y + b.y) * 0.5;
      const xMid = (a.x + b.x) * 0.5;
      const progress = i / Math.max(1, path.length - 1);

      // ルート風船（2個 + 中盤以降3個目）
      this.addBalloon(
        Phaser.Math.Linear(a.x, b.x, 0.33),
        Phaser.Math.Linear(a.y, b.y, 0.33) - 20,
        points[i % points.length],
        progress < 0.3 ? 'fixed' : (i % 2 === 0 ? 'updown' : 'fixed')
      );
      this.addBalloon(
        Phaser.Math.Linear(a.x, b.x, 0.66),
        Phaser.Math.Linear(a.y, b.y, 0.66) - 20,
        points[(i + 1) % points.length],
        progress < 0.3 ? 'fixed' : (i % 2 === 1 ? 'leftright' : 'fixed')
      );
      if (progress >= 0.3) {
        this.addBalloon(xMid, yMid - 50, points[(i + 2) % points.length], 'updown');
      }

      // ボーナス風船（端寄り、4セグメントごと）
      if (i % 4 === 2) {
        const bx = (b.x < GAME_W * 0.5) ? GAME_W * 0.82 : GAME_W * 0.18;
        this.addBalloon(bx, yMid - 40, bonus[i % bonus.length], 'fixed');
      }

      // 回復風船（3セグメントごと → 全ルートで3-4個）
      if (i % 3 === 1) {
        const rx = Phaser.Math.Clamp(xMid + (b.x > a.x ? -60 : 60), 60, GAME_W - 60);
        this.addBalloon(rx, yMid - 30, 0, 'fixed', { kind: 'recover' });
      }
    }
  }

  createStage3Balloons() {
    const points = [20, 30, 40];
    const bonus = [70, 90];
    const path = this.woodPath || [];
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i + 1];
      const yMid = (a.y + b.y) * 0.5;
      const xMid = (a.x + b.x) * 0.5;

      // 全セグメントに移動風船（最終ステージらしい難易度）
      this.addBalloon(
        Phaser.Math.Linear(a.x, b.x, 0.25),
        Phaser.Math.Linear(a.y, b.y, 0.25) - 20,
        points[i % points.length],
        'leftright'
      );
      this.addBalloon(
        Phaser.Math.Linear(a.x, b.x, 0.50),
        yMid - 50,
        points[(i + 1) % points.length],
        'updown'
      );
      this.addBalloon(
        Phaser.Math.Linear(a.x, b.x, 0.75),
        Phaser.Math.Linear(a.y, b.y, 0.75) - 20,
        points[(i + 2) % points.length],
        i % 2 === 0 ? 'leftright' : 'updown'
      );

      // ボーナス風船（3セグメントごと、高得点だが端に配置）
      if (i % 3 === 1) {
        const bx = (b.x < GAME_W * 0.5) ? GAME_W * 0.88 : GAME_W * 0.12;
        this.addBalloon(bx, yMid - 80, bonus[i % bonus.length], 'leftright');
      }

      // 回復風船（4セグメントごと → 計3個、最終ステージは厳しめ）
      if (i % 4 === 2) {
        const rx = Phaser.Math.Clamp(xMid + (b.x > a.x ? -50 : 50), 60, GAME_W - 60);
        this.addBalloon(rx, yMid - 30, 0, 'updown', { kind: 'recover' });
      }
    }
  }

  createGoalMarker() {
    if (!this.goalWood) return;
    const gx = this.goalWood.x;
    const gy = this.goalWood.y - 104;
    this.goalRing = this.add.circle(gx, gy, 28, 0xfff59d, 0.24).setDepth(8);
    this.goalLabel = this.add.text(gx, gy - 48, 'GOAL', {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '22px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: '#FF6B9D',
      strokeThickness: 5
    }).setOrigin(0.5).setDepth(9);

    this.goalObject = this.physics.add.staticImage(gx, gy, 'goal_marker');
    this.goalObject.debugId = 'G001';
    this.goalObject.body.setSize(28, 72, true);
    this.goalObject.body.setOffset(0, 8);
    this.goalObject.debugLabel = this.createDebugObjectLabel(this.goalObject, this.goalObject.debugId, -66, '#FFF59D');
  }

  showStageBanner(title, subtitle = '') {
    const overlay = this.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0x000000, 0.36)
      .setDepth(300)
      .setScrollFactor(0);
    const t1 = this.add.text(GAME_W / 2, GAME_H / 2 - 24, title, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '42px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: '#FF6B9D',
      strokeThickness: 6
    }).setOrigin(0.5).setDepth(301).setScrollFactor(0);
    const t2 = this.add.text(GAME_W / 2, GAME_H / 2 + 26, subtitle, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '20px',
      color: '#FFFFFF',
      stroke: '#FF6B9D',
      strokeThickness: 4
    }).setOrigin(0.5).setDepth(301).setScrollFactor(0);
    this.inputLocked = true;
    this.time.delayedCall(850, () => {
      overlay.destroy();
      t1.destroy();
      t2.destroy();
      this.inputLocked = false;
    });
  }

  handleStageClear() {
    this.isFlying = false;
    this.isFalling = false;
    if (this.arrow && this.arrow.body) {
      this.arrow.body.setVelocity(0, 0);
      this.arrow.body.setAllowGravity(false);
    }
    this.inputLocked = true;

    const isFinal = this.stageIndex >= STAGE_COUNT;
    const title = isFinal ? 'ALL CLEAR!' : `STAGE ${this.stageIndex} CLEAR`;
    const subtitle = isFinal ? 'おつかれさま！' : 'つぎのステージへ';
    const overlay = this.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0x000000, 0.42)
      .setDepth(320)
      .setScrollFactor(0);
    const text = this.add.text(GAME_W / 2, GAME_H / 2, `${title}\n${subtitle}`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '36px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: '#FF6B9D',
      strokeThickness: 6,
      align: 'center'
    }).setOrigin(0.5).setDepth(321).setScrollFactor(0);

    this.time.delayedCall(1300, () => {
      overlay.destroy();
      text.destroy();
      if (isFinal) {
        this.scene.start('GameOver', { score: this.score, clear: true, stageIndex: this.stageIndex });
      } else {
        const carryArrows = Math.min(MAX_ARROWS, INITIAL_ARROWS + this.arrowCount);
        this.scene.restart({
          stageIndex: this.stageIndex + 1,
          score: this.score,
          arrowCount: carryArrows
        });
      }
    });
  }

  addBalloon(x, y, point, moveType = 'fixed', options = {}) {
    const isWarp = options.kind === 'warp';
    const isRecover = options.kind === 'recover';
    const colorIdx = Phaser.Math.Between(0, 4);
    const texture = isWarp ? 'balloon_warp' : isRecover ? 'balloon_recover' : `balloon_${colorIdx}`;
    const textureKey = this.textures.exists(texture) ? texture : 'balloon_0';
    const balloon = this.balloonGroup.create(x, y, textureKey);
    balloon.debugId = `B${String(this.nextBalloonId++).padStart(3, '0')}`;
    balloon.setImmovable(true);
    balloon.body.setAllowGravity(false);
    // 風船本体のみを判定にする（紐は除外）
    if (isWarp) {
      balloon.body.setSize(56, 56);
      balloon.body.setOffset(8, 8);
    } else {
      balloon.body.setSize(52, 52);
      balloon.body.setOffset(10, 10);
    }
    balloon.scoreValue = (isWarp || isRecover) ? 0 : point;
    balloon.kind = isWarp ? 'warp' : isRecover ? 'recover' : 'normal';
    balloon.warpPairId = options.warpPairId || null;
    balloon.moveType = moveType;
    balloon.baseX = x;
    balloon.baseY = y;
    balloon.moveAmp = moveType === 'updown'
      ? Phaser.Math.Between(18, 36)
      : moveType === 'leftright'
        ? Phaser.Math.Between(20, 42)
        : 0;
    balloon.moveSpeed = Phaser.Math.FloatBetween(BALLOON_MOVE_SPEED_MIN, BALLOON_MOVE_SPEED_MAX);
    balloon.movePhase = Phaser.Math.FloatBetween(0, Math.PI * 2);
    if (moveType !== 'fixed') {
      this.movingBalloons.push(balloon);
    }

    // スコア数値テキスト
    const text = this.add.text(x, y - 14, isWarp ? '' : isRecover ? '🏹+1' : `+${point}`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '16px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: isWarp ? '#5C6BC0' : isRecover ? '#558B2F' : '#FF6B9D',
      strokeThickness: 3
    }).setOrigin(0.5);
    balloon.scoreText = text;
    const typeCode = isRecover ? 'R' : isWarp ? 'W' : 'N';
    balloon.debugLabel = this.createDebugObjectLabel(balloon, `${balloon.debugId}-${typeCode}`, -52, '#2979FF');

    return balloon;
  }

  addWarpPair(id, x1, y1, x2, y2) {
    const p1 = this.adjustWarpPosAwayFromWind(x1, y1);
    const p2 = this.adjustWarpPosAwayFromWind(x2, y2);
    const b1 = this.addBalloon(p1.x, p1.y, 0, 'fixed', { kind: 'warp', warpPairId: id });
    const b2 = this.addBalloon(p2.x, p2.y, 0, 'fixed', { kind: 'warp', warpPairId: id });

    const pairColor = 0x5c6bc0;
    const t1 = this.add.text(b1.x, b1.y - 44, `${id}⇄`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '14px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: '#5C6BC0',
      strokeThickness: 4
    }).setOrigin(0.5);
    const t2 = this.add.text(b2.x, b2.y - 44, `${id}⇄`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '14px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      stroke: '#5C6BC0',
      strokeThickness: 4
    }).setOrigin(0.5);
    b1.scoreText = t1;
    b2.scoreText = t2;

    this.warpPairs.push({ id, a: b1, b: b2, color: pairColor });
  }

  adjustWarpPosAwayFromWind(x, y) {
    let nx = x;
    let ny = y;
    const layout = this.getWindLayout();
    for (let i = 0; i < layout.length; i++) {
      const wz = layout[i];
      const wx = GAME_W * wz.xRate;
      const wy = GAME_H - 420 + wz.yOffset;
      const dx = nx - wx;
      const dy = ny - wy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 130) {
        const push = 130 - dist;
        ny += push + 20;
        nx = Phaser.Math.Clamp(nx + (dx < 0 ? -18 : 18), 70, GAME_W - 70);
      }
    }
    return { x: nx, y: ny };
  }

  drawWarpGuides() {
    if (!this.warpPairs || this.warpPairs.length === 0) return;
    if (this.warpGuideGraphics) {
      this.warpGuideGraphics.clear();
    } else {
      this.warpGuideGraphics = this.add.graphics().setDepth(14);
    }
    this.warpPairs.forEach(pair => {
      if (!pair.a.active || !pair.b.active) return;
      const ax = pair.a.x, ay = pair.a.y;
      const bx = pair.b.x, by = pair.b.y;
      const angleAB = Math.atan2(by - ay, bx - ax);
      const angleBA = Math.atan2(ay - by, ax - bx);

      // 接続ガイド本線
      this.warpGuideGraphics.lineStyle(3, pair.color, 0.55);
      this.warpGuideGraphics.beginPath();
      this.warpGuideGraphics.moveTo(ax, ay);
      this.warpGuideGraphics.lineTo(bx, by);
      this.warpGuideGraphics.strokePath();

      // 破線ドット
      const steps = 12;
      this.warpGuideGraphics.fillStyle(pair.color, 0.65);
      for (let i = 1; i < steps; i++) {
        const t = i / steps;
        this.warpGuideGraphics.fillCircle(
          Phaser.Math.Linear(ax, bx, t),
          Phaser.Math.Linear(ay, by, t),
          3.5
        );
      }

      // 行き先リング
      this.warpGuideGraphics.lineStyle(3, pair.color, 0.85);
      this.warpGuideGraphics.strokeCircle(ax, ay, 30);
      this.warpGuideGraphics.strokeCircle(bx, by, 30);

      // 双方向矢印ヘッド
      const headLen = 12;
      const wing = Math.PI / 7;
      const drawHead = (tx, ty, angle) => {
        this.warpGuideGraphics.beginPath();
        this.warpGuideGraphics.moveTo(tx, ty);
        this.warpGuideGraphics.lineTo(
          tx - Math.cos(angle - wing) * headLen,
          ty - Math.sin(angle - wing) * headLen
        );
        this.warpGuideGraphics.moveTo(tx, ty);
        this.warpGuideGraphics.lineTo(
          tx - Math.cos(angle + wing) * headLen,
          ty - Math.sin(angle + wing) * headLen
        );
        this.warpGuideGraphics.strokePath();
      };
      drawHead(bx, by, angleAB);
      drawHead(ax, ay, angleBA);
    });
  }

  createWinds() {
    const startY = GAME_H - 420;
    const layout = this.getWindLayout();
    layout.forEach(w => {
      const key = this.textures.exists(w.key) ? w.key : 'wind_mark_weak';
      const zone = this.windGroup.create(GAME_W * w.xRate, startY + w.yOffset, key);
      zone.debugId = `F${String(this.nextWindId++).padStart(3, '0')}`;
      zone.setImmovable(true);
      zone.setScale(1.0, 1.0);
      if (w.dirX < 0) zone.setFlipX(true);
      zone.refreshBody();
      zone.windDirX = w.dirX;
      zone.windStrength = w.strength;

      const tag = this.add.text(GAME_W * w.xRate, startY + w.yOffset - 40, w.label, {
        fontFamily: "'M PLUS Rounded 1c'",
        fontSize: '14px',
        fontStyle: 'bold',
        color: '#FFFFFF',
        stroke: '#FF6B9D',
        strokeThickness: 3
      }).setOrigin(0.5);
      zone.windTag = tag;
      zone.debugLabel = this.createDebugObjectLabel(zone, zone.debugId, -58, '#FDD835');
    });
  }

  getWindLayout() {
    if (this.stageIndex === 1) return WIND_ZONE_LAYOUT_STAGE1;
    if (this.stageIndex === 2) return WIND_ZONE_LAYOUT_STAGE2;
    return WIND_ZONE_LAYOUT_STAGE3;
  }

  // ---- 矢のスポーン ----
  spawnArrow() {
    const wx = this.currentAnchor.x;
    const wy = this.currentAnchor.y - 28; // 木の上に出現

    if (this.arrow) this.arrow.destroy();

    // 矢を物理ボディとして生成
    // 原点を矢の先端（右端）に設定するため、offsetで調整
    this.arrow = this.physics.add.image(wx, wy, 'arrow');
    this.arrow.setOrigin(1.0, 0.5); // 原点=右端（先端）
    this.arrow.setRotation(-Math.PI / 2); // 待機中は上向き
    this.arrow.setCollideWorldBounds(false);
    this.arrow.body.setAllowGravity(false);
    this.arrow.setDepth(5);

    this.isFlying   = false;
    this.isFalling  = false;
    this.isDragging = false;
    this.flightDistanceLeft = 0;
    this.fallStartY = 0;

    // 矢の当たり判定を再設定（先端付近のみ）
    this.arrow.body.setSize(20, 10);
    // 原点=先端(this.arrow.x, this.arrow.y)に当たり判定中心を合わせる
    this.arrow.body.setOffset(50, 1);
    this.currentArrowType = this.getNextArrowType();
    this.currentArrowConfig = this.arrowTypeConfigMap[this.currentArrowType] || this.arrowTypeConfigMap.normal;
    this.updateArrowTypeUI();

    // カメラをリフレッシュ
    this.cameras.main.startFollow(this.arrow, true, 0.08, 0.08);
    this.cameras.main.setFollowOffset(0, GAME_H * 0.3);

    // 新しい矢に衝突判定を再接続
    this.setupCollisions();
  }

  // ---- 衝突判定設定 ----
  setupCollisions() {
    // 古い矢の衝突判定を掃除
    this.arrowColliders.forEach(collider => collider.destroy());
    this.arrowColliders = [];

    // 風船
    this.arrowColliders.push(this.physics.add.overlap(this.arrow, this.balloonGroup, (arrow, balloon) => {
      this.hitBalloon(balloon);
    }));

    // 風ゾーン
    this.arrowColliders.push(this.physics.add.overlap(this.arrow, this.windGroup, (arrow, windZone) => {
      this.applyWind(windZone);
    }));

    // 専用ゴールオブジェクト
    if (this.goalObject) {
      this.arrowColliders.push(this.physics.add.overlap(this.arrow, this.goalObject, () => {
        if (this.isFlying && !this.inputLocked) {
          this.handleStageClear();
        }
      }));
    }

    // 木に刺さる
    this.arrowColliders.push(this.physics.add.overlap(this.arrow, this.woodColliderGroup, (arrow, woodCollider) => {
      if (this.isFlying) {
        const wood = woodCollider.parentWood;
        if (wood && wood.active) {
          this.stickToWood(wood);
        }
      }
    }));
  }

  // ---- 入力設定 ----
  setupInput() {
    this.input.on('pointerdown', (ptr) => {
      if (this.inputLocked) return;
      if (this.isFlying) return; // 飛行中はスワイプ不可
      this.isDragging = true;
      this.dragStart  = { x: ptr.x, y: ptr.y };
    });

    this.input.on('pointermove', (ptr) => {
      if (!this.isDragging) return;
      this.drawDragIndicator(ptr.x, ptr.y);
    });

    this.input.on('pointerup', (ptr) => {
      if (!this.isDragging) return;
      this.isDragging = false;
      this.dragGraphics.clear();
      this.fireArrow(ptr.x, ptr.y);
    });
  }

  // ---- ドラッグインジケーター描画 ----
  drawDragIndicator(px, py) {
    this.dragGraphics.clear();

    const dx = this.dragStart.x - px;
    const dy = this.dragStart.y - py;
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), ARROW_MAX_DRAG);

    if (dist < 5) return;

    // ゴム弓のような弧線
    this.dragGraphics.lineStyle(3, 0xFF6B9D, 0.6);
    this.dragGraphics.beginPath();
    this.dragGraphics.moveTo(this.dragStart.x, this.dragStart.y);
    this.dragGraphics.lineTo(px, py);
    this.dragGraphics.strokePath();

    // 発射方向の予測点線（Graphics#setLineDash非依存）
    const arrowScreenX = this.arrow.x - this.cameras.main.scrollX;
    const arrowScreenY = this.arrow.y - this.cameras.main.scrollY;

    const angle = Math.atan2(dy, dx);
    const power = dist / ARROW_MAX_DRAG;

    const previewLen = 100 * power;
    this.dragGraphics.fillStyle(0xFF6B9D, 0.35);
    for (let d = 10; d <= previewLen; d += 14) {
      this.dragGraphics.fillCircle(
        arrowScreenX + Math.cos(angle) * d,
        arrowScreenY + Math.sin(angle) * d,
        3
      );
    }

    // 点線の終端に方向矢印
    const tipX = arrowScreenX + Math.cos(angle) * previewLen;
    const tipY = arrowScreenY + Math.sin(angle) * previewLen;
    const headLen = 14;
    const wing = Math.PI / 7;
    this.dragGraphics.lineStyle(3, 0xFF6B9D, 0.9);
    this.dragGraphics.beginPath();
    this.dragGraphics.moveTo(tipX, tipY);
    this.dragGraphics.lineTo(
      tipX - Math.cos(angle - wing) * headLen,
      tipY - Math.sin(angle - wing) * headLen
    );
    this.dragGraphics.moveTo(tipX, tipY);
    this.dragGraphics.lineTo(
      tipX - Math.cos(angle + wing) * headLen,
      tipY - Math.sin(angle + wing) * headLen
    );
    this.dragGraphics.strokePath();

    // ドラッグ中は待機矢の角度も点線UIに合わせる
    if (!this.isFlying && this.arrow) {
      this.arrow.setRotation(angle);
    }

    // パワー円
    this.dragGraphics.lineStyle(2, 0xFFB7C5, 0.5);
    this.dragGraphics.strokeCircle(this.dragStart.x, this.dragStart.y, dist);
  }

  // ---- 矢を発射 ----
  fireArrow(px, py) {
    // 引っ張った逆方向に発射
    const dx = this.dragStart.x - px;
    const dy = this.dragStart.y - py;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 10) return; // 微小な入力は無視

    const clampedDist = Math.min(dist, ARROW_MAX_DRAG);
    const power  = clampedDist / ARROW_MAX_DRAG;
    const angle  = Math.atan2(dy, dx); // 引っ張り逆方向

    const speedMul = this.currentArrowConfig ? this.currentArrowConfig.speedMul : 1;
    const rangeMul = this.currentArrowConfig ? this.currentArrowConfig.rangeMul : 1;
    const vx = Math.cos(angle) * ARROW_SPEED_BASE * power * speedMul;
    const vy = Math.sin(angle) * ARROW_SPEED_BASE * power * speedMul;

    const rangePower = Math.pow(power, ARROW_RANGE_EXP);
    this.flightDistanceLeft = Phaser.Math.Linear(0, ARROW_RANGE_MAX * rangeMul, rangePower);
    this.isFalling = false;
    this.arrow.body.setAllowGravity(false);
    this.arrow.body.setVelocity(vx, vy);
    this.arrow.setRotation(angle); // 飛行方向に矢を回転

    this.isFlying   = true;
    this.isDragging = false;
    this.shotsFired++;
  }

  // ---- 壁反射 ----
  reflectArrow(arrow, wall) {
    const vx = arrow.body.velocity.x;
    const vy = arrow.body.velocity.y;
    // 左右壁 → X速度を反転
    arrow.body.setVelocityX(-vx);
    // 反射後の角度に矢を向ける
    arrow.setRotation(Math.atan2(vy, -vx));
  }

  applyWind(windZone) {
    if (!this.arrow || !this.isFlying || !this.arrow.body) return;
    if (this.time.now < this.warpStabilizeUntil) return;
    const dirX = windZone.windDirX || 1;
    const strength = windZone.windStrength || WIND_STRENGTH_WEAK;

    const vx = this.arrow.body.velocity.x;
    const vy = this.arrow.body.velocity.y;
    const speed = Math.max(260, Math.sqrt(vx * vx + vy * vy));
    const targetVx = dirX * speed;
    const windMul = this.currentArrowConfig ? this.currentArrowConfig.windMul : 1;
    const eff = strength * windMul;
    const nextVx = Phaser.Math.Linear(vx, targetVx, eff);
    const nextVy = vy * (1 - eff * 0.35);

    this.arrow.body.setVelocity(nextVx, nextVy);
  }

  // ---- 風船ヒット ----
  hitBalloon(balloon) {
    if (balloon.kind === 'warp') {
      this.activateWarp(balloon);
      return;
    }
    if (balloon.isConsumed) return;
    balloon.isConsumed = true;
    if (balloon.body) balloon.body.enable = false;

    if (balloon.kind === 'recover') {
      this.arrowCount = Math.min(MAX_ARROWS, this.arrowCount + 1);
      this.updateArrowUI();
    }

    // スコア加算
    this.score += balloon.scoreValue;
    this.updateScoreUI();

    // エフェクト（スケールアップして消える）
    this.tweens.add({
      targets: balloon,
      scaleX: 2,
      scaleY: 2,
      alpha: 0,
      duration: 200,
      onComplete: () => {
        this.movingBalloons = this.movingBalloons.filter(b => b !== balloon);
        if (balloon.scoreText) balloon.scoreText.destroy();
        balloon.destroy();
      }
    });

    // ポップテキスト
    const popLabel = balloon.kind === 'recover' ? '🏹+1' : `+${balloon.scoreValue}`;
    const popColor = balloon.kind === 'recover' ? '#7CB342' : '#FF6B9D';
    const popText = this.add.text(balloon.x, balloon.y - 20, popLabel, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '24px',
      fontStyle: 'bold',
      color: popColor,
      stroke: '#FFFFFF',
      strokeThickness: 4
    }).setOrigin(0.5).setDepth(20);

    this.tweens.add({
      targets: popText,
      y: balloon.y - 80,
      alpha: 0,
      duration: 600,
      onComplete: () => popText.destroy()
    });
  }

  activateWarp(balloon) {
    if (!this.arrow || !this.isFlying || !balloon.warpPairId) return;
    if (this.time.now - this.lastWarpAt < 260) return;
    if (this.time.now < this.warpIgnoreUntil && this.warpIgnorePairId === balloon.warpPairId) return;

    const pair = this.balloonGroup.getChildren().filter(b =>
      b.active && b.kind === 'warp' && b.warpPairId === balloon.warpPairId && b !== balloon
    );
    if (pair.length === 0) return;
    const target = pair[0];

    this.lastWarpAt = this.time.now;
    this.warpIgnorePairId = balloon.warpPairId;
    this.warpIgnoreUntil = this.time.now + 520;
    this.warpStabilizeUntil = this.time.now + 120;

    // ワープ先の円の中央から出現
    this.arrow.setPosition(target.x, target.y);
    this.arrow.body.updateFromGameObject();

    // ワープ直後のスクロール違和感を減らすため、追従を一瞬だけスナップ
    const cam = this.cameras.main;
    cam.setLerp(1, 1);
    this.time.delayedCall(34, () => {
      if (!this.sys || !this.sys.isActive()) return;
      if (!this.cameras || !this.cameras.main) return;
      cam.setLerp(0.08, 0.08);
    });

    const flash = this.add.circle(target.x, target.y, 18, 0x8c9eff, 0.5).setDepth(25);
    this.tweens.add({
      targets: flash,
      scaleX: 2.3,
      scaleY: 2.3,
      alpha: 0,
      duration: 220,
      onComplete: () => flash.destroy()
    });
  }

  // ---- 木に刺さる ----
  stickToWood(wood) {
    // ゴール木に着地 → ステージクリア（矢を消費しない）
    if (wood === this.goalWood) {
      this.handleStageClear();
      return;
    }

    this.isFlying = false;
    this.isFalling = false;
    this.arrow.body.setVelocity(0, 0);
    this.arrow.body.setAllowGravity(false);
    this.currentAnchor = { x: wood.x, y: wood.y };
    if (wood.landingCollider && wood.landingCollider.active) {
      wood.landingCollider.destroy();
    }
    wood.destroy(); // 刺さった木は消す
    this.arrowCount--;
    this.updateArrowUI();

    if (this.arrowCount <= 0) {
      // ゲームオーバー
      this.time.delayedCall(300, () => {
        this.scene.start('GameOver', { score: this.score, stageIndex: this.stageIndex });
      });
    } else {
      // 少し待って次の矢を準備
      this.time.delayedCall(300, () => {
        this.spawnArrow();
      });
    }
  }

  // ---- UI生成 ----
  createUI() {
    // スコア表示（右上）
    this.scoreText = this.add.text(GAME_W - 20, 50, 'スコア: 0', {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '22px',
      fontStyle: 'bold',
      color: '#FF6B9D',
      stroke: '#FFFFFF',
      strokeThickness: 4,
      align: 'right'
    }).setOrigin(1, 0.5).setDepth(100).setScrollFactor(0);

    // 矢UI（下部）
    this.arrowIcons = [];
    this.arrowUIContainer = this.add.container(0, GAME_H - 50).setDepth(100).setScrollFactor(0);
    this.rebuildArrowUI();

    // 矢タイプ表示は公開版では非表示
    this.arrowTypeText = null;
  }

  updateScoreUI() {
    this.scoreText.setText(`スコア: ${this.score}`);
  }

  rebuildArrowUI() {
    this.arrowUIContainer.removeAll(true);
    const spacing = 36;
    const totalW  = this.arrowCount * spacing;
    const startX  = (GAME_W - totalW) / 2 + spacing / 2;
    for (let i = 0; i < this.arrowCount; i++) {
      const icon = this.add.text(startX + i * spacing, 0, '🏹', {
        fontSize: '26px'
      }).setOrigin(0.5);
      this.arrowUIContainer.add(icon);
    }
  }

  updateArrowUI() {
    this.rebuildArrowUI();
  }

  getNextArrowType() {
    if ((this.shotsFired + 1) % SPECIAL_ARROW_INTERVAL === 0) return 'boost';
    return 'normal';
  }

  updateArrowTypeUI() {
    if (!this.arrowTypeText || !this.currentArrowConfig) return;
    if (!this.arrowTypeText.active || !this.arrowTypeText.scene) return;
    this.arrowTypeText.setText(`矢タイプ: ${this.currentArrowConfig.label}`);
    this.arrowTypeText.setBackgroundColor(this.currentArrowConfig.uiColor);
  }

  createDebugToggleUI() {
    const label = this.showDebugHitbox ? '判定: ON' : '判定: OFF';
    const bg = this.showDebugHitbox ? '#00C853' : '#B0BEC5';
    this.debugToggleBtn = this.add.text(16, 20, label, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '16px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      backgroundColor: bg,
      padding: { x: 12, y: 8 }
    }).setOrigin(0, 0).setDepth(120).setScrollFactor(0).setInteractive({ useHandCursor: true });

    this.debugToggleBtn.on('pointerdown', () => {
      this.showDebugHitbox = !this.showDebugHitbox;
      this.debugToggleBtn.setText(this.showDebugHitbox ? '判定: ON' : '判定: OFF');
      this.debugToggleBtn.setBackgroundColor(this.showDebugHitbox ? '#00C853' : '#B0BEC5');
      localStorage.setItem(DEBUG_HITBOX_STORAGE_KEY, this.showDebugHitbox ? '1' : '0');
      if (!this.showDebugHitbox) this.hitboxGraphics.clear();
      if (this.showDebugHitbox) this.rebuildDebugObjectLabels();
      this.setDebugOverlayVisible(this.showDebugHitbox);
    });

    const hasNextStage = this.stageIndex < STAGE_COUNT;
    const nextLabel = hasNextStage ? '次ステージへ' : '最終ステージ';
    const nextBg = hasNextStage ? '#FF8F00' : '#90A4AE';
    this.debugNextStageBtn = this.add.text(140, 20, nextLabel, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '16px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      backgroundColor: nextBg,
      padding: { x: 12, y: 8 }
    }).setOrigin(0, 0).setDepth(120).setScrollFactor(0);

    if (hasNextStage) {
      this.debugNextStageBtn.setInteractive({ useHandCursor: true });
      this.debugNextStageBtn.on('pointerdown', () => {
        if (this.inputLocked) return;
        this.scene.restart({
          stageIndex: this.stageIndex + 1,
          score: this.score,
          arrowCount: this.arrowCount
        });
      });
    }
  }

  createDebugObjectLabel(target, text, yOffset = -42, color = '#FFFFFF') {
    if (!ENABLE_DEBUG_UI) return null;
    const label = this.add.text(target.x, target.y + yOffset, text, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '13px',
      fontStyle: 'bold',
      color,
      stroke: '#000000',
      strokeThickness: 3
    }).setOrigin(0.5).setDepth(132);
    label.debugTarget = target;
    label.debugOffsetY = yOffset;
    this.debugObjectLabels.push(label);
    return label;
  }

  createDebugScreenGuides() {
    if (!this.debugScreenGraphics) return;
    const topLimit = -WORLD_HEIGHT + GAME_H;
    const count = Math.ceil(WORLD_HEIGHT / GAME_H);
    this.debugScreenGraphics.clear();
    this.debugScreenGraphics.lineStyle(1.5, 0xffffff, 0.28);
    for (let i = 0; i <= count; i++) {
      const y = GAME_H - i * GAME_H;
      if (y < topLimit) break;
      this.debugScreenGraphics.beginPath();
      this.debugScreenGraphics.moveTo(0, y);
      this.debugScreenGraphics.lineTo(GAME_W, y);
      this.debugScreenGraphics.strokePath();
      const t = this.add.text(10, y + 8, `画面 ${i}`, {
        fontFamily: "'M PLUS Rounded 1c'",
        fontSize: '12px',
        fontStyle: 'bold',
        color: '#FFFFFF',
        stroke: '#000000',
        strokeThickness: 3
      }).setOrigin(0, 0).setDepth(131);
      this.debugScreenTexts.push(t);
    }
  }

  setDebugOverlayVisible(visible) {
    if (this.debugScreenGraphics) this.debugScreenGraphics.setVisible(visible);
    this.debugScreenTexts.forEach(t => t.setVisible(visible));
    this.debugObjectLabels.forEach(t => t.setVisible(visible));
    if (this.debugPanelText) this.debugPanelText.setVisible(visible);
    if (this.debugNextStageBtn) {
      this.debugNextStageBtn.setVisible(visible);
      if (visible && this.stageIndex < STAGE_COUNT) {
        this.debugNextStageBtn.setInteractive({ useHandCursor: true });
      } else {
        this.debugNextStageBtn.disableInteractive();
      }
    }
  }

  createDebugPanel() {
    this.debugPanelText = this.add.text(12, 96, '', {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '12px',
      color: '#FFFFFF',
      backgroundColor: '#455A64',
      padding: { x: 8, y: 6 }
    }).setOrigin(0, 0).setDepth(140).setScrollFactor(0);
  }

  updateDebugPanel() {
    if (!this.showDebugHitbox || !this.debugPanelText || !this.cameras || !this.cameras.main) return;
    const view = this.cameras.main.worldView;
    const approxScreen = Math.max(0, Math.floor((GAME_H - view.centerY) / GAME_H));
    const inView = (obj) => obj && obj.active && obj.x >= view.x && obj.x <= view.right && obj.y >= view.y && obj.y <= view.bottom;

    const woods = (this.woodGroup ? this.woodGroup.getChildren() : []).filter(inView).slice(0, 5).map(o => o.debugId || '?');
    const balloons = (this.balloonGroup ? this.balloonGroup.getChildren() : []).filter(inView).slice(0, 6).map(o => o.debugId || '?');
    const winds = (this.windGroup ? this.windGroup.getChildren() : []).filter(inView).slice(0, 4).map(o => o.debugId || '?');
    const goal = (this.goalObject && inView(this.goalObject)) ? (this.goalObject.debugId || 'G001') : '-';

    this.debugPanelText.setText(
      `画面: ${approxScreen}\n` +
      `木: ${woods.join(', ') || '-'}\n` +
      `風船: ${balloons.join(', ') || '-'}\n` +
      `風: ${winds.join(', ') || '-'}\n` +
      `ゴール: ${goal}`
    );
  }

  rebuildDebugObjectLabels() {
    if (!this.debugObjectLabels) this.debugObjectLabels = [];
    this.debugObjectLabels.forEach(t => t.destroy());
    this.debugObjectLabels = [];

    if (this.woodGroup) {
      this.woodGroup.getChildren().forEach(wood => {
        if (!wood.active || !wood.debugId) return;
        wood.debugLabel = this.createDebugObjectLabel(wood, wood.debugId, -40, '#00C853');
      });
    }
    if (this.balloonGroup) {
      this.balloonGroup.getChildren().forEach(balloon => {
        if (!balloon.active || !balloon.debugId) return;
        const suffix = balloon.kind === 'recover' ? 'R' : balloon.kind === 'warp' ? 'W' : 'N';
        balloon.debugLabel = this.createDebugObjectLabel(balloon, `${balloon.debugId}-${suffix}`, -52, '#2979FF');
      });
    }
    if (this.windGroup) {
      this.windGroup.getChildren().forEach(zone => {
        if (!zone.active || !zone.debugId) return;
        zone.debugLabel = this.createDebugObjectLabel(zone, zone.debugId, -58, '#FDD835');
      });
    }
  }

  startFalling() {
    if (this.isFalling) return;
    this.isFalling = true;
    this.fallStartY = this.arrow.y;
    this.arrow.body.setAllowGravity(true);
  }

  // ---- 毎フレーム更新 ----
  update(time, delta) {
    this.drawDebugHitboxes();
    this.updateDebugObjectLabels();
    this.updateDebugPanel();
    this.updateMovingBalloons(time);
    if (!this.arrow || !this.isFlying) return;

    const dt = delta / 1000;

    // 飛距離を使い切ったら落下へ遷移
    if (!this.isFalling) {
      const speed = this.arrow.body.velocity.length();
      this.flightDistanceLeft -= speed * dt;
      if (this.flightDistanceLeft <= 0) {
        this.startFalling();
      }
    }

    // 原点=先端を使った左右壁の反射（見た目と判定を一致）
    const tipX = this.arrow.x;
    const vxNow = this.arrow.body.velocity.x;
    const vyNow = this.arrow.body.velocity.y;
    if (tipX <= WALL_W && vxNow < 0) {
      this.arrow.x = WALL_W;
      this.arrow.body.setVelocityX(Math.abs(vxNow));
      this.arrow.setRotation(Math.atan2(vyNow, Math.abs(vxNow)));
    } else if (tipX >= GAME_W - WALL_W && vxNow > 0) {
      this.arrow.x = GAME_W - WALL_W;
      this.arrow.body.setVelocityX(-Math.abs(vxNow));
      this.arrow.setRotation(Math.atan2(vyNow, -Math.abs(vxNow)));
    }

    // 落下中は横速度を徐々に減らす
    if (this.isFalling) {
      this.arrow.body.setVelocityX(this.arrow.body.velocity.x * 0.985);
    }

    // 飛行中は速度方向に矢を向ける
    const vx = this.arrow.body.velocity.x;
    const vy = this.arrow.body.velocity.y;
    if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
      this.arrow.setRotation(Math.atan2(vy, vx));
    }

    // 落下中は、ステージ開始位置まで戻ったらゲームオーバー
    if (this.isFalling && this.arrow.y >= this.stageStartY) {
      this.scene.start('GameOver', { score: this.score, stageIndex: this.stageIndex });
      return;
    }

    // 念のため、画面下に大きく落ちた場合もゲームオーバー
    if (this.arrow.y > this.cameras.main.scrollY + GAME_H + 100) {
      this.scene.start('GameOver', { score: this.score, stageIndex: this.stageIndex });
    }

  }

  updateMovingBalloons(time) {
    if (!this.movingBalloons || this.movingBalloons.length === 0) return;
    for (let i = this.movingBalloons.length - 1; i >= 0; i--) {
      const balloon = this.movingBalloons[i];
      if (!balloon || !balloon.active || !balloon.body) {
        this.movingBalloons.splice(i, 1);
        continue;
      }
      const t = time * balloon.moveSpeed + balloon.movePhase;
      if (balloon.moveType === 'updown') {
        balloon.setPosition(balloon.baseX, balloon.baseY + Math.sin(t) * balloon.moveAmp);
      } else if (balloon.moveType === 'leftright') {
        balloon.setPosition(balloon.baseX + Math.sin(t) * balloon.moveAmp, balloon.baseY);
      }
      balloon.body.updateFromGameObject();
      if (balloon.scoreText && balloon.scoreText.active) {
        balloon.scoreText.setPosition(balloon.x, balloon.y - 14);
      }
    }
  }

  updateDebugObjectLabels() {
    if (!this.showDebugHitbox || !this.debugObjectLabels) return;
    for (let i = this.debugObjectLabels.length - 1; i >= 0; i--) {
      const label = this.debugObjectLabels[i];
      if (!label || !label.active) continue;
      const target = label.debugTarget;
      if (!target || !target.active) {
        label.setVisible(false);
        continue;
      }
      label.setVisible(true);
      label.setPosition(target.x, target.y + (label.debugOffsetY || -42));
    }
  }

  drawDebugHitboxes() {
    if (!this.showDebugHitbox || !this.hitboxGraphics || !this.woodColliderGroup) return;

    this.hitboxGraphics.clear();
    // 木の当たり判定（緑）
    this.hitboxGraphics.lineStyle(2, 0x00c853, 0.95);
    this.hitboxGraphics.fillStyle(0x00c853, 0.18);
    this.woodColliderGroup.getChildren().forEach(collider => {
      if (!collider.active || !collider.body) return;
      const b = collider.body;
      this.hitboxGraphics.fillRect(b.x, b.y, b.width, b.height);
      this.hitboxGraphics.strokeRect(b.x, b.y, b.width, b.height);
    });

    // 風船の当たり判定（青）
    if (this.balloonGroup) {
      this.hitboxGraphics.lineStyle(2, 0x2979ff, 0.95);
      this.hitboxGraphics.fillStyle(0x2979ff, 0.15);
      this.balloonGroup.getChildren().forEach(balloon => {
        if (!balloon.active || !balloon.body) return;
        const b = balloon.body;
        this.hitboxGraphics.fillRect(b.x, b.y, b.width, b.height);
        this.hitboxGraphics.strokeRect(b.x, b.y, b.width, b.height);
      });
    }

    // 風ゾーンの当たり判定（黄）
    if (this.windGroup) {
      this.hitboxGraphics.lineStyle(2, 0xfdd835, 0.95);
      this.hitboxGraphics.fillStyle(0xfdd835, 0.18);
      this.windGroup.getChildren().forEach(zone => {
        if (!zone.active || !zone.body) return;
        const b = zone.body;
        this.hitboxGraphics.fillRect(b.x, b.y, b.width, b.height);
        this.hitboxGraphics.strokeRect(b.x, b.y, b.width, b.height);
      });
    }

    // 矢の当たり判定（赤）
    if (this.arrow && this.arrow.body) {
      const b = this.arrow.body;
      this.hitboxGraphics.lineStyle(2, 0xff1744, 0.95);
      this.hitboxGraphics.fillStyle(0xff1744, 0.2);
      this.hitboxGraphics.fillRect(b.x, b.y, b.width, b.height);
      this.hitboxGraphics.strokeRect(b.x, b.y, b.width, b.height);
    }
  }
}

// ============================================================
//  GameOverScene: ゲームオーバー画面
// ============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  init(data) {
    this.finalScore = data.score || 0;
    this.isClear = !!data.clear;
    this.stageIndex = data.stageIndex || 1;
  }

  create() {
    this.input.enabled = true;

    // ハイスコア保存
    const best = parseInt(localStorage.getItem('arrow_balloon_best') || '0');
    if (this.finalScore > best) {
      localStorage.setItem('arrow_balloon_best', String(this.finalScore));
    }
    const bestScore = Math.max(best, this.finalScore);

    // 背景
    this.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0xFFF0F5, 0.9);

    // タイトル
    this.add.text(GAME_W / 2, GAME_H / 2 - 160, this.isClear ? 'ゲームクリア' : 'ゲームオーバー', {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '36px',
      fontStyle: 'bold',
      color: '#FF6B9D',
      stroke: '#FFFFFF',
      strokeThickness: 5
    }).setOrigin(0.5);

    // スコア
    this.add.text(GAME_W / 2, GAME_H / 2 - 60, `スコア: ${this.finalScore}`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '28px',
      color: '#FF6B9D'
    }).setOrigin(0.5);

    // ハイスコア
    this.add.text(GAME_W / 2, GAME_H / 2 + 0, `ベスト: ${bestScore}`, {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '22px',
      color: '#FFB7C5'
    }).setOrigin(0.5);

    // リトライボタン（当たり判定を広く確保）
    const btnBg = this.add.rectangle(GAME_W / 2, GAME_H / 2 + 100, 220, 68, 0xFF6B9D, 1)
      .setOrigin(0.5)
      .setInteractive({ useHandCursor: true });
    const btn = this.add.text(GAME_W / 2, GAME_H / 2 + 100, 'もう一度 🏹', {
      fontFamily: "'M PLUS Rounded 1c'",
      fontSize: '28px',
      fontStyle: 'bold',
      color: '#FFFFFF',
      padding: { x: 8, y: 4 }
    }).setOrigin(0.5);

    let isRestarting = false;
    const restartGame = () => {
      if (isRestarting) return;
      isRestarting = true;
      this.scene.start('Game', {
        stageIndex: this.stageIndex,
        score: 0,
        arrowCount: INITIAL_ARROWS
      });
    };

    btnBg.on('pointerdown', restartGame);
    btnBg.on('pointerup', restartGame);
    btnBg.on('pointerover', () => btnBg.setFillStyle(0xFF85B3, 1));
    btnBg.on('pointerout', () => btnBg.setFillStyle(0xFF6B9D, 1));
  }
}

// ---- Phaser 設定（クラス定義後に初期化）----
const config = {
  type: Phaser.AUTO,
  width:  GAME_W,
  height: GAME_H,
  parent: 'game-container',
  backgroundColor: '#FFF0F5',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 1200 }, // 落下フェーズで矢に重力を適用
      debug: false
    }
  },
  scene: [BootScene, GameScene, GameOverScene]
};

new Phaser.Game(config);
</script>
