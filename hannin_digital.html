<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>犯人は踊る 風 デジタル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1:#fff0f5;
      --bg2:#e8f8ff;
      --ink:#5f3a52;
      --panel:rgba(255,255,255,0.84);
      --pink:#ff91c8;
      --blue:#8fd8ff;
      --ok:#69ce9f;
      --bad:#ee7ea0;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:none;font-family:"M PLUS Rounded 1c",sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg1),var(--bg2))}
    .app{width:min(100vw,720px);height:100vh;margin:0 auto;padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom)) 10px;display:grid;grid-template-rows:auto auto auto auto 1fr;gap:8px}
    .panel{background:var(--panel);border:2px solid #fff;border-radius:14px;padding:8px 10px}
    .title{font-size:18px;font-weight:800}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chip{background:rgba(255,255,255,0.92);border-radius:10px;padding:4px 8px;font-size:13px;font-weight:700}
    select{border:2px solid #fff;border-radius:10px;padding:7px;background:#fff;color:var(--ink);font:inherit;font-weight:700}
    .players{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .p{border-radius:10px;background:rgba(255,255,255,0.9);padding:6px 8px;font-size:13px;font-weight:700;display:flex;justify-content:space-between}
    .p.active{box-shadow:0 0 0 3px rgba(255,145,200,0.55) inset}
    .p.you{border:1px solid rgba(143,216,255,0.65)}
    .msg{min-height:52px;font-size:19px;font-weight:800;line-height:1.35}
    button{appearance:none;border:0;border-radius:12px;padding:10px 12px;color:#fff;font:inherit;font-weight:800;background:var(--pink);box-shadow:0 3px 0 rgba(116,74,97,0.22)}
    button.secondary{background:var(--blue)}
    button:disabled{opacity:.45}
    .hand-title{font-size:13px;font-weight:800;margin-bottom:6px}
    .hand-wrap{display:grid;grid-template-rows:1fr auto;gap:8px;min-height:94px}
    .hand{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;align-content:flex-start;min-height:64px}
    .card{width:100%;min-width:0;height:64px;border-radius:12px;border:2px solid #fff;background:#fff;padding:6px;display:grid;grid-template-rows:auto 1fr;gap:2px;text-align:center;box-shadow:0 2px 0 rgba(118,84,104,0.2);color:var(--ink)}
    .card .name{font-size:14px;font-weight:800;line-height:1.1}
    .card .desc{font-size:10px;font-weight:700;line-height:1.2;color:#7d6274}
    .card.selected{box-shadow:0 0 0 3px rgba(255,145,200,0.65) inset;transform:translateY(-1px)}
    .hand-footer{display:flex;justify-content:flex-end}
    .hand-play{min-width:132px}
    .history{font-size:12px;font-weight:700;color:#8d7386;min-height:220px;overflow:auto}
    .line{padding:2px 0;border-bottom:1px dashed rgba(136,108,125,.3)}

    .modal-bg{position:fixed;inset:0;background:rgba(35,22,32,0.35);display:none;place-items:center;z-index:40}
    .modal-bg.show{display:grid}
    .modal{width:min(92vw,560px);background:rgba(255,255,255,0.97);border:2px solid #fff;border-radius:14px;padding:10px}
    .modal h3{margin:0 0 8px 0;font-size:15px}
    .choices{display:flex;flex-wrap:wrap;gap:6px}
    .choice{padding:8px 10px;border-radius:10px;border:2px solid #fff;background:#fff;color:var(--ink);font-weight:800}

    .cutin{position:fixed;inset:0;display:grid;place-items:center;opacity:0;transform:scale(1.03);pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:50;text-shadow:0 3px 10px rgba(0,0,0,.3);text-align:center;padding:20px}
    .cutin.show{opacity:1;transform:scale(1);pointer-events:auto;cursor:pointer}
    .cutin-main{font-size:40px;font-weight:800;color:#fff;line-height:1.2}
    .cutin-sub{margin-top:10px;font-size:14px;font-weight:700;color:rgba(255,255,255,.92)}
    .cutin.you{background:rgba(255,145,200,.45)}
    .cutin.npc{background:rgba(143,216,255,.45)}
    .cutin.win{background:rgba(105,206,159,.45)}
    .cutin.lose{background:rgba(238,126,160,.45)}
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="title">犯人は踊る 風（デジタル体験）</div>
      <div class="row">
        <label class="chip">人数
          <select id="playerCount">
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
            <option value="8">8人</option>
          </select>
        </label>
        <button class="secondary" id="newBtn">新しく開始</button>
        <div class="chip" id="turnInfo">手番: あなた</div>
        <div class="chip" id="deckInfo">山札: 0</div>
        <div class="chip" id="roundInfo">周回: 1周目</div>
        <div class="chip" id="resultInfo">勝敗: 進行中</div>
      </div>
    </div>

    <div class="panel players" id="players"></div>

    <div class="panel msg" id="message"></div>

    <div class="panel">
      <div class="hand-title">あなたの手札</div>
      <div class="hand-wrap">
        <div class="hand" id="hand"></div>
        <div class="hand-footer">
          <button class="hand-play" id="playBtn">カードを出す</button>
        </div>
      </div>
    </div>

    <div class="panel history" id="history"></div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">選択</h3>
      <div class="choices" id="modalChoices"></div>
    </div>
  </div>

  <div class="cutin" id="cutin"></div>

  <script>
    (() => {
      const CARD_DEFS = {
        firstfinder: { name: "第一発見者", desc: "このカード所持者が先手", color: "#ffe0e0" },
        culprit: { name: "犯人", desc: "手札1枚時のみ出せる。出せたら勝ち", color: "#d8f0ff" },
        detective: { name: "探偵", desc: "2周目以降。相手1人を指名して推理", color: "#d8e9ff" },
        alibi: { name: "アリバイ", desc: "持っていれば探偵/いぬを回避", color: "#f0e3ff" },
        plot: { name: "たくらみ", desc: "犯人陣営になる", color: "#d8ecff" },
        dog: { name: "いぬ", desc: "相手1人の手札1枚を公開", color: "#ffe5dc" },
        boy: { name: "少年", desc: "犯人の所在を知る", color: "#fff0bf" },
        rumor: { name: "うわさ", desc: "全員 次の人から1枚ひく", color: "#ffdff2" },
        trade: { name: "取り引き", desc: "誰か1人と1枚交換", color: "#dff7de" },
        info: { name: "情報操作", desc: "全員 前の人へ1枚わたす", color: "#e8ffd8" },
        civilian: { name: "一般人", desc: "何も起きない", color: "#def3ff" },
        eyewitness: { name: "目撃者", desc: "相手1人の手札をすべて見る", color: "#d8eeff" },
      };

      // 32枚構成（この体験版で固定）
      const FULL_DECK_COUNTS = {
        firstfinder: 1,
        culprit: 1,
        detective: 2,
        alibi: 3,
        plot: 2,
        dog: 1,
        boy: 1,
        rumor: 3,
        trade: 3,
        info: 2,
        civilian: 9,
        eyewitness: 2,
        // 合計32
      };

      const PREP_RULE = {
        3: { required: { firstfinder: 1, culprit: 1, detective: 1, alibi: 1 }, random: 8 },
        4: { required: { firstfinder: 1, culprit: 1, detective: 1, alibi: 1, plot: 1 }, random: 11 },
        5: { required: { firstfinder: 1, culprit: 1, detective: 1, alibi: 2, plot: 1 }, random: 14 },
        6: { required: { firstfinder: 1, culprit: 1, detective: 2, alibi: 2, plot: 2 }, random: 16 },
        7: { required: { firstfinder: 1, culprit: 1, detective: 2, alibi: 3, plot: 2 }, random: 19 },
        8: { required: null, random: 0 },
      };

      const state = {
        players: [],
        deck: [],
        turn: 0,
        startingTurn: 0,
        turnCount: 0,
        started: false,
        selectedCardId: null,
        gameOver: false,
        cutinActive: false,
        pendingActionCutinText: "",
        pendingActionCutinTone: "",
      };

      const el = {
        playerCount: document.getElementById("playerCount"),
        newBtn: document.getElementById("newBtn"),
        turnInfo: document.getElementById("turnInfo"),
        deckInfo: document.getElementById("deckInfo"),
        roundInfo: document.getElementById("roundInfo"),
        resultInfo: document.getElementById("resultInfo"),
        players: document.getElementById("players"),
        message: document.getElementById("message"),
        playBtn: document.getElementById("playBtn"),
        hand: document.getElementById("hand"),
        history: document.getElementById("history"),
        modalBg: document.getElementById("modalBg"),
        modalTitle: document.getElementById("modalTitle"),
        modalChoices: document.getElementById("modalChoices"),
        cutin: document.getElementById("cutin"),
      };

      function log(line) {
        const d = document.createElement("div");
        d.className = "line";
        d.textContent = line;
        el.history.prepend(d);
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
      }

      function setMessage(text, tone) {
        el.message.textContent = text;
        if (tone === "ok") el.message.style.color = "var(--ok)";
        else if (tone === "bad") el.message.style.color = "var(--bad)";
        else el.message.style.color = "var(--ink)";
      }

      function showCutin(text, tone) {
        return new Promise((resolve) => {
          state.cutinActive = true;
          el.cutin.innerHTML = `<div><div class="cutin-main">${text}</div><div class="cutin-sub">タップして続行</div></div>`;
          el.cutin.className = "cutin " + (tone || "") + " show";
          render();
          let closed = false;
          const closeCutin = () => {
            if (closed) return;
            closed = true;
            el.cutin.onclick = null;
            el.cutin.className = "cutin " + (tone || "");
            el.cutin.innerHTML = "";
            setTimeout(() => {
              state.cutinActive = false;
              render();
              resolve();
            }, 140);
          };
          el.cutin.onclick = closeCutin;
        });
      }

      function currentPlayer() { return state.players[state.turn]; }
      function isPlayerTurn() { return state.turn === 0; }
      function loopCount() { return Math.floor(state.turnCount / state.players.length) + 1; }
      function isFirstCycle() { return state.turnCount < state.players.length; }

      function buildFullDeck() {
        const deck = [];
        Object.keys(FULL_DECK_COUNTS).forEach((type) => {
          const cnt = FULL_DECK_COUNTS[type];
          for (let i = 0; i < cnt; i += 1) {
            deck.push({ id: type + "_" + i + "_" + Math.random().toString(36).slice(2, 6), type });
          }
        });
        return deck;
      }

      function takeByType(pool, type, count) {
        for (let i = 0; i < count; i += 1) {
          const idx = pool.findIndex((c) => c.type === type);
          if (idx < 0) return false;
          pool.splice(idx, 1);
        }
        return true;
      }

      function prepareDeckByPlayerCount(n) {
        const rule = PREP_RULE[n];
        const full = buildFullDeck();
        if (n === 8) return full;

        const picked = [];
        const pool = full.slice();

        for (const [type, cnt] of Object.entries(rule.required)) {
          for (let i = 0; i < cnt; i += 1) {
            const idx = pool.findIndex((c) => c.type === type);
            if (idx < 0) throw new Error("カード不足: " + type);
            picked.push(pool.splice(idx, 1)[0]);
          }
        }

        shuffle(pool);
        picked.push(...pool.slice(0, rule.random));
        return picked;
      }

      function drawCard(player, n = 1) {
        for (let i = 0; i < n; i += 1) {
          if (state.deck.length === 0) return;
          player.hand.push(state.deck.pop());
        }
      }

      function findCardIndex(player, cardId) {
        return player.hand.findIndex((c) => c.id === cardId);
      }

      function playerHasType(player, type) {
        return player.hand.some((c) => c.type === type);
      }

      function removeRandomCard(fromPlayer) {
        if (fromPlayer.hand.length === 0) return null;
        const idx = Math.floor(Math.random() * fromPlayer.hand.length);
        return fromPlayer.hand.splice(idx, 1)[0];
      }

      function openChoice(title, choices, onPick) {
        el.modalTitle.textContent = title;
        el.modalChoices.innerHTML = "";
        let picked = false;
        choices.forEach((c) => {
          const b = document.createElement("button");
          b.className = "choice";
          b.textContent = c.label;
          b.onclick = () => {
            if (picked) return;
            picked = true;
            closeChoice();
            onPick(c.value);
          };
          el.modalChoices.appendChild(b);
        });
        el.modalBg.classList.add("show");
      }

      function closeChoice() {
        el.modalBg.classList.remove("show");
        el.modalChoices.innerHTML = "";
      }

      function targetChoices(exceptTurn) {
        return state.players
          .map((p, i) => ({ p, i }))
          .filter((x) => x.i !== exceptTurn)
          .map((x) => ({ label: x.p.name, value: x.i }));
      }

      function chooseOwnCard(player, title, onPick) {
        const choices = player.hand.map((c) => ({ label: CARD_DEFS[c.type].name, value: c.id }));
        if (choices.length === 0) {
          onPick(null);
          return;
        }
        openChoice(title, choices, onPick);
      }

      function chooseOwnCardAsync(player, title) {
        return new Promise((resolve) => {
          chooseOwnCard(player, title, resolve);
        });
      }

      function chooseBlindFromPlayer(player, title, onPick) {
        const choices = player.hand.map((_, idx) => ({ label: "カード " + (idx + 1), value: idx }));
        if (choices.length === 0) {
          onPick(null);
          return;
        }
        openChoice(title, choices, onPick);
      }

      function renderPlayers() {
        el.players.innerHTML = "";
        const n = state.players.length;
        const orderedIdx = Array.from({ length: n }, (_, k) => (state.startingTurn + k) % n);
        orderedIdx.forEach((i, orderPos) => {
          const p = state.players[i];
          const d = document.createElement("div");
          d.className = "p" + (i === state.turn ? " active" : "") + (i === 0 ? " you" : "");
          const marks = [];
          if (p.plot) marks.push("たくらみ");
          const order = orderPos + 1;
          d.innerHTML = `<span>${order}. ${p.name}${marks.length ? "（" + marks.join("/") + "）" : ""}</span><span>手札:${p.hand.length}</span>`;
          el.players.appendChild(d);
        });
      }

      function renderHand() {
        el.hand.innerHTML = "";
        const you = state.players[0];
        you.hand.forEach((card) => {
          const def = CARD_DEFS[card.type];
          const b = document.createElement("button");
          b.className = "card" + (state.selectedCardId === card.id ? " selected" : "");
          b.style.background = def.color;
          b.innerHTML = `<div class="name">${def.name}</div><div class="desc">${def.desc}</div>`;
          b.onclick = () => {
            if (!isPlayerTurn() || state.gameOver || state.cutinActive) return;
            state.selectedCardId = state.selectedCardId === card.id ? null : card.id;
            render();
          };
          el.hand.appendChild(b);
        });
      }

      function render() {
        if (!state.started || state.players.length === 0) {
          el.playBtn.disabled = true;
          el.players.innerHTML = "";
          el.hand.innerHTML = "";
          return;
        }
        const turnPlayer = currentPlayer();
        el.turnInfo.textContent = "手番: " + turnPlayer.name;
        el.deckInfo.textContent = "山札: " + state.deck.length;
        el.roundInfo.textContent = "周回: " + loopCount() + "周目";
        const selected = state.players[0].hand.find((c) => c.id === state.selectedCardId);
        el.playBtn.disabled = !isPlayerTurn() || !selected || state.gameOver || state.cutinActive;

        renderPlayers();
        renderHand();
      }

      function winnersByMainWinner(mainWinnerIdx, isCulpritWin) {
        const winners = new Set([mainWinnerIdx]);
        if (isCulpritWin) {
          state.players.forEach((p, idx) => {
            if (p.plot) winners.add(idx);
          });
        }
        return winners;
      }

      async function winBy(mainWinnerIdx, reason, options = {}) {
        state.gameOver = true;
        const winners = winnersByMainWinner(mainWinnerIdx, !!options.isCulpritWin);
        const youWin = winners.has(0);
        const names = Array.from(winners).map((idx) => state.players[idx].name).join(" / ");
        el.resultInfo.textContent = "勝敗: " + names + " 勝利";
        setMessage(reason + " 勝者: " + names, youWin ? "ok" : "bad");
        await showCutin(youWin ? "あなたの勝ち" : "あなたの負け", youWin ? "win" : "lose", 900);
      }

      function nextTurn(options = {}) {
        if (state.gameOver) return;
        const cutinText = String(options.cutinText || "").trim();
        state.pendingActionCutinText = cutinText;
        state.pendingActionCutinTone = cutinText ? (options.cutinTone || "npc") : "";
        state.turn = (state.turn + 1) % state.players.length;
        state.turnCount += 1;
        render();
        scheduleTurnAction();
      }

      function isCardPlayableNow(player, card) {
        if (card.type === "culprit" && player.hand.length > 1) return false;
        if (card.type === "detective" && state.turnCount < state.players.length) return false;
        return true;
      }

      function mustPlayFirstFinder(playerIdx) {
        if (!isFirstCycle()) return false;
        return state.players[playerIdx].hand.some((c) => c.type === "firstfinder");
      }

      async function handleForcedFirstFinder() {
        if (state.gameOver) return false;
        if (!mustPlayFirstFinder(state.turn)) return false;
        const p = currentPlayer();
        const ff = p.hand.find((c) => c.type === "firstfinder");
        if (!ff) return false;

        if (state.turn === 0) {
          await showCutin("第一発見者", "you", 520);
          setMessage("初手ルール: 第一発見者を自動で出します。");
        } else {
          await showCutin(p.name + "の第一発見者", "npc", 520);
          setMessage("初手ルール: " + p.name + " が第一発見者を出しました。");
        }
        await playCard(state.turn, ff.id);
        return true;
      }

      function scheduleTurnAction() {
        if (state.gameOver) return;
        setTimeout(async () => {
          if (state.gameOver) return;
          if (state.pendingActionCutinText) {
            const text = state.pendingActionCutinText;
            const tone = state.pendingActionCutinTone || "npc";
            state.pendingActionCutinText = "";
            state.pendingActionCutinTone = "";
            await showCutin(text, tone);
            if (state.gameOver) return;
          }
          const forced = await handleForcedFirstFinder();
          if (forced || state.gameOver) return;
          if (!isPlayerTurn()) npcAct();
        }, 320);
      }

      function startGame() {
        const n = Number(el.playerCount.value);
        const deck = prepareDeckByPlayerCount(n);
        shuffle(deck);

        state.players = Array.from({ length: n }).map((_, i) => ({
          name: i === 0 ? "あなた" : "NPC" + i,
          hand: [],
          plot: false,
        }));
        state.deck = deck;
        state.selectedCardId = null;
        state.started = true;
        state.gameOver = false;
        state.cutinActive = false;
        state.pendingActionCutinText = "";
        state.pendingActionCutinTone = "";
        state.turnCount = 0;
        el.resultInfo.textContent = "勝敗: 進行中";
        el.history.innerHTML = "";

        // 各4枚配り
        for (let r = 0; r < 4; r += 1) {
          for (let i = 0; i < n; i += 1) drawCard(state.players[i], 1);
        }

        // 第一発見者所持者が先手
        let starter = state.players.findIndex((p) => playerHasType(p, "firstfinder"));
        if (starter < 0) starter = 0;
        state.turn = starter;
        state.startingTurn = starter;

        setMessage("ゲーム開始。第一発見者を持つ " + state.players[starter].name + " が先手です。");
        log("準備: " + n + "人 / 先手=" + state.players[starter].name);
        render();
        scheduleTurnAction();
      }

      function initBeforeStart() {
        state.players = [];
        state.deck = [];
        state.turn = 0;
        state.startingTurn = 0;
        state.turnCount = 0;
        state.started = false;
        state.selectedCardId = null;
        state.gameOver = false;
        state.cutinActive = false;
        state.pendingActionCutinText = "";
        state.pendingActionCutinTone = "";
        el.turnInfo.textContent = "手番: -";
        el.deckInfo.textContent = "山札: -";
        el.roundInfo.textContent = "周回: -";
        el.resultInfo.textContent = "勝敗: 未開始";
        el.players.innerHTML = "";
        el.hand.innerHTML = "";
        el.history.innerHTML = "";
        setMessage("人数を選んで「新しく開始」を押してください。");
        closeChoice();
        render();
      }

      async function playCard(playerIdx, cardId) {
        if (playerIdx !== state.turn) return;
        const p = state.players[playerIdx];
        const idx = findCardIndex(p, cardId);
        if (idx < 0 || state.gameOver) return;
        const proceed = () => nextTurn({
          cutinText: el.message.textContent,
          cutinTone: playerIdx === 0 ? "you" : "npc",
        });

        const card = p.hand[idx];

        if (card.type === "culprit" && p.hand.length > 1) {
          if (playerIdx === 0) setMessage("犯人は手札1枚のときのみ出せます。", "bad");
          return;
        }
        if (card.type === "detective" && state.turnCount < state.players.length) {
          if (playerIdx === 0) setMessage("探偵は2周目から使えます。", "bad");
          return;
        }

        p.hand.splice(idx, 1);
        const def = CARD_DEFS[card.type];
        log(p.name + " が「" + def.name + "」を使用");

        if (card.type === "culprit") {
          await winBy(playerIdx, p.name + " が犯人を出しました。", { isCulpritWin: true });
          return;
        }

        if (card.type === "firstfinder") {
          setMessage(p.name + " が第一発見者を出した（効果なし）。");
          proceed();
          return;
        }

        if (card.type === "alibi") {
          setMessage(p.name + " がアリバイを出した（場では効果なし）。");
          proceed();
          return;
        }

        if (card.type === "plot") {
          p.plot = true;
          setMessage(p.name + " がたくらみを出し、犯人陣営になりました。");
          proceed();
          return;
        }

        if (card.type === "boy") {
          const holder = state.players.find((pl) => playerHasType(pl, "culprit"));
          if (playerIdx === 0) {
            setMessage("少年の情報: 犯人は「" + holder.name + "」が所持。", "ok");
          } else {
            setMessage(p.name + " が少年を使いました。");
          }
          proceed();
          return;
        }

        if (card.type === "civilian") {
          setMessage(p.name + " は一般人。何も起きません。");
          proceed();
          return;
        }

        if (card.type === "rumor") {
          if (playerIdx === 0) {
            const right = state.players[(playerIdx + 1) % state.players.length];
            setMessage("うわさ: 次の人から取るカードを選択してください。");
            chooseBlindFromPlayer(right, "うわさ: 次の人から取るカードを選択（中身は見えない）", (pickIdx) => {
              if (pickIdx == null) {
                setMessage("次の人にカードがありません。");
                proceed();
                return;
              }
              const stolen = right.hand.splice(pickIdx, 1)[0];
              p.hand.push(stolen);
              for (let i = 1; i < state.players.length; i += 1) {
                const taker = state.players[i];
                const from = state.players[(i + 1) % state.players.length];
                const c = removeRandomCard(from);
                if (c) taker.hand.push(c);
              }
              setMessage("うわさ発動。あなたは選択し、他プレイヤーも次の人から1枚ひきました。");
              proceed();
            });
          } else {
            const take = Array.from({ length: state.players.length }, () => null);
            for (let i = 0; i < state.players.length; i += 1) {
              const from = state.players[(i + 1) % state.players.length];
              take[i] = removeRandomCard(from);
            }
            for (let i = 0; i < state.players.length; i += 1) {
              if (take[i]) state.players[i].hand.push(take[i]);
            }
            setMessage("うわさ発動。全員が次の人から1枚ひきました。");
            proceed();
          }
          return;
        }

        if (card.type === "info") {
          if (playerIdx === 0) {
            setMessage("情報操作: 前の人へ渡すカードを選択してください。");
            chooseOwnCard(p, "情報操作: 前の人へ渡すカードを選択", (myId) => {
              const give = Array.from({ length: state.players.length }, () => null);
              if (myId != null) {
                const mi = findCardIndex(p, myId);
                if (mi >= 0) give[playerIdx] = p.hand.splice(mi, 1)[0];
              }
              for (let i = 1; i < state.players.length; i += 1) {
                const pi = state.players[i];
                if (pi.hand.length > 0) {
                  const ridx = Math.floor(Math.random() * pi.hand.length);
                  give[i] = pi.hand.splice(ridx, 1)[0];
                }
              }
              for (let i = 0; i < state.players.length; i += 1) {
                const to = (i - 1 + state.players.length) % state.players.length;
                if (give[i]) state.players[to].hand.push(give[i]);
              }
              setMessage("情報操作発動。あなたは選択し、全員が前の人へ1枚わたしました。");
              proceed();
            });
          } else {
            const give = Array.from({ length: state.players.length }, () => null);
            for (let i = 0; i < state.players.length; i += 1) {
              const pi = state.players[i];
              if (pi.hand.length === 0) {
                give[i] = null;
                continue;
              }
              if (i === 0) {
                setMessage("NPCの情報操作: あなたが渡すカードを選択してください。");
                const yourCardId = await chooseOwnCardAsync(pi, "NPCの情報操作: 前の人へ渡すあなたのカードを選択");
                const yi = yourCardId != null ? findCardIndex(pi, yourCardId) : -1;
                give[i] = yi >= 0 ? pi.hand.splice(yi, 1)[0] : removeRandomCard(pi);
              } else {
                give[i] = removeRandomCard(pi);
              }
            }
            for (let i = 0; i < state.players.length; i += 1) {
              const to = (i - 1 + state.players.length) % state.players.length;
              if (give[i]) state.players[to].hand.push(give[i]);
            }
            setMessage("情報操作発動。全員が前の人へ1枚わたしました。");
            proceed();
          }
          return;
        }

        if (card.type === "trade") {
          const targets = targetChoices(playerIdx);
          const pickTarget = async (targetIdx) => {
            if (p.hand.length === 0 || state.players[targetIdx].hand.length === 0) {
              setMessage("取り引きできません（どちらか手札なし）。");
              proceed();
              return;
            }
            const execTrade = async (myId, targetPickIdx) => {
              const mi = findCardIndex(p, myId);
              if (mi < 0) { proceed(); return; }
              const mine = p.hand.splice(mi, 1)[0];
              const t = state.players[targetIdx];
              let theirs = null;
              if (targetIdx === 0 && playerIdx !== 0) {
                setMessage("NPCの取り引き: あなたが交換に出すカードを選択してください。");
                const yourCardId = await chooseOwnCardAsync(t, "NPCの取り引き: あなたが交換に出すカードを選択");
                const yi = yourCardId != null ? findCardIndex(t, yourCardId) : -1;
                theirs = yi >= 0 ? t.hand.splice(yi, 1)[0] : removeRandomCard(t);
              } else if (targetPickIdx != null && targetPickIdx >= 0 && targetPickIdx < t.hand.length) {
                theirs = t.hand.splice(targetPickIdx, 1)[0];
              } else {
                theirs = removeRandomCard(t);
              }
              if (!theirs) {
                p.hand.push(mine);
                setMessage("相手のカードがなく交換できませんでした。");
                proceed();
                return;
              }
              p.hand.push(theirs);
              t.hand.push(mine);
              setMessage(p.name + " が " + state.players[targetIdx].name + " と交換しました。");
              proceed();
            };
            if (playerIdx === 0) {
              openChoice("交換で出すあなたのカードを選択", p.hand.map((c) => ({ label: CARD_DEFS[c.type].name, value: c.id })), (myId) => {
                const target = state.players[targetIdx];
                chooseBlindFromPlayer(target, "相手から取るカードを選択（中身は見えない）", (targetPickIdx) => {
                  execTrade(myId, targetPickIdx);
                });
              });
            } else {
              await execTrade(p.hand[Math.floor(Math.random() * p.hand.length)].id, null);
            }
          };
          if (playerIdx === 0) {
            setMessage("取り引き: 相手と交換カードを選択してください。");
            openChoice("取り引き相手を選択", targets, pickTarget);
          }
          else await pickTarget(targets[Math.floor(Math.random() * targets.length)].value);
          return;
        }

        if (card.type === "eyewitness") {
          const targets = targetChoices(playerIdx);
          const act = (targetIdx) => {
            const t = state.players[targetIdx];
            if (playerIdx === 0) {
              const list = t.hand.map((c) => CARD_DEFS[c.type].name).join(" / ") || "なし";
              openChoice(t.name + " の手札: " + list, [{ label: "OK", value: "ok" }], () => {
                setMessage("目撃者を発動しました。確認相手: " + t.name, "ok");
                proceed();
              });
              return;
            } else {
              setMessage(p.name + " が目撃者を発動。確認相手: " + t.name);
            }
            proceed();
          };
          if (playerIdx === 0) openChoice("目撃者: 対象を選択", targets, act);
          else act(targets[Math.floor(Math.random() * targets.length)].value);
          return;
        }

        if (card.type === "dog") {
          const targets = targetChoices(playerIdx);
          const act = async (targetIdx) => {
            const t = state.players[targetIdx];
            if (t.hand.length === 0) {
              setMessage(t.name + " の手札がありません。");
              proceed();
              return;
            }
            const resolveRevealed = async (revealed) => {
              const name = CARD_DEFS[revealed.type].name;
              if (revealed.type === "culprit") {
                if (playerHasType(t, "alibi")) {
                  setMessage(t.name + " はアリバイ所持。いぬの的中を回避。", "bad");
                  proceed();
                  return;
                }
                await winBy(playerIdx, p.name + " のいぬが犯人を発見！（公開: " + name + "）");
              } else {
                setMessage("いぬの公開: " + t.name + " のカードは「" + name + "」。", "bad");
                proceed();
              }
            };

            if (playerIdx === 0) {
              chooseBlindFromPlayer(t, "いぬ: 公開するカードを選択（中身は見えない）", async (pickIdx) => {
                if (pickIdx == null || pickIdx < 0 || pickIdx >= t.hand.length) {
                  setMessage("公開するカードを選べませんでした。");
                  proceed();
                  return;
                }
                await resolveRevealed(t.hand[pickIdx]);
              });
            } else {
              const revealed = t.hand[Math.floor(Math.random() * t.hand.length)];
              await resolveRevealed(revealed);
            }
          };
          if (playerIdx === 0) openChoice("いぬ: 対象を選択", targets, act);
          else act(targets[Math.floor(Math.random() * targets.length)].value);
          return;
        }

        if (card.type === "detective") {
          const targets = targetChoices(playerIdx);
          const investigate = async (targetIdx) => {
            const t = state.players[targetIdx];
            await showCutin("犯人は「" + t.name + "」だ", playerIdx === 0 ? "you" : "npc", 650);
            if (playerHasType(t, "culprit")) {
              if (playerHasType(t, "alibi")) {
                setMessage(t.name + " はアリバイ所持。探偵の的中を回避。", "bad");
                await showCutin("違います！", "lose", 640);
                proceed();
                return;
              }
              await winBy(playerIdx, p.name + " の探偵が的中！");
            } else {
              setMessage(p.name + " の推理は外れ。", "bad");
              await showCutin("違います！", "lose", 640);
              proceed();
            }
          };
          if (playerIdx === 0) openChoice("探偵: 調べる相手", targets, investigate);
          else investigate(targets[Math.floor(Math.random() * targets.length)].value);
          return;
        }

        proceed();
      }

      async function npcAct() {
        if (state.gameOver || isPlayerTurn() || state.cutinActive) return;
        const npc = currentPlayer();
        if (npc.hand.length === 0) {
          setMessage(npc.name + " は手札がなく手番を飛ばしました。");
          nextTurn({ cutinText: el.message.textContent, cutinTone: "npc" });
          return;
        }

        await showCutin(npc.name + "のターン", "npc", 520);

        const priority = {
          culprit: 0,
          detective: state.turnCount >= state.players.length ? 1 : 9,
          dog: 2,
          eyewitness: 3,
          trade: 4,
          rumor: 5,
          info: 6,
          boy: 7,
          plot: 8,
          firstfinder: 10,
          alibi: 11,
          civilian: 12,
        };

        const playable = npc.hand.filter((c) => isCardPlayableNow(npc, c));
        if (playable.length === 0) {
          setMessage(npc.name + " は出せるカードがなく手番を飛ばしました。");
          nextTurn({ cutinText: el.message.textContent, cutinTone: "npc" });
          return;
        }
        const sorted = playable.slice().sort((a, b) => (priority[a.type] ?? 99) - (priority[b.type] ?? 99));
        const pick = sorted[0] || npc.hand[0];
        playCard(state.turn, pick.id);
      }

      async function playerPlay() {
        if (!state.started || state.players.length === 0) {
          setMessage("先に「新しく開始」を押してください。", "bad");
          return;
        }
        if (!isPlayerTurn() || state.gameOver || state.cutinActive) return;
        if (mustPlayFirstFinder(0)) {
          const ff = state.players[0].hand.find((c) => c.type === "firstfinder");
          if (ff) {
            setMessage("初手は第一発見者を必ず出します。", "bad");
            await playCard(0, ff.id);
            return;
          }
        }
        if (!state.selectedCardId) {
          setMessage("手札を1枚選んでください。", "bad");
          return;
        }
        const id = state.selectedCardId;
        state.selectedCardId = null;
        render();
        await playCard(0, id);
      }

      el.playBtn.addEventListener("click", playerPlay);
      el.newBtn.addEventListener("click", startGame);

      initBeforeStart();
    })();
  </script>
</body>
