<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ハゲタカのえじき風 1人プレイ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #fff0f5;
      --bg2: #e7f8ff;
      --panel: rgba(255, 255, 255, 0.82);
      --ink: #5d3850;
      --pink: #ff8fc2;
      --blue: #8fd8ff;
      --ok: #66cfa0;
      --warn: #ef7fa2;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: "M PLUS Rounded 1c", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .app {
      width: min(100vw, 620px);
      height: 100vh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)) 10px;
      display: grid;
      grid-template-rows: auto auto auto auto auto 1fr auto;
      gap: 8px;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #fff;
      border-radius: 14px;
      padding: 8px 10px;
    }
    .title { font-size: 18px; font-weight: 800; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip {
      background: rgba(255,255,255,0.88);
      border-radius: 10px;
      padding: 4px 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .score-item {
      border-radius: 10px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
    }
    .score-item.you { box-shadow: 0 0 0 3px rgba(255, 143, 194, 0.55) inset; }
    .prize-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .prize {
      border-radius: 12px;
      border: 2px solid #fff;
      padding: 8px;
      text-align: center;
      font-weight: 800;
      background: rgba(255,255,255,0.92);
    }
    .prize .value { font-size: 36px; line-height: 1; margin-top: 2px; }
    .prize.plus .value { color: var(--ok); }
    .prize.minus .value { color: var(--warn); }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      font: inherit;
      font-weight: 800;
      background: var(--pink);
      box-shadow: 0 3px 0 rgba(118, 74, 97, 0.24);
    }
    button.secondary { background: var(--blue); }
    button:disabled { opacity: 0.45; }
    button:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(118,74,97,0.2); }
    .msg { min-height: 38px; font-size: 13px; font-weight: 700; line-height: 1.35; }
    .reveal-title { font-size: 13px; font-weight: 800; margin-bottom: 6px; }
    .reveal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .reveal-card {
      border-radius: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #fff;
      padding: 6px 8px;
      text-align: center;
      font-weight: 700;
    }
    .reveal-card .name { font-size: 12px; color: #7b6073; }
    .reveal-card .num { font-size: 30px; line-height: 1; margin-top: 2px; font-weight: 800; }
    .reveal-card.win { box-shadow: 0 0 0 3px rgba(102, 207, 160, 0.65) inset; }
    .reveal-card.tie { box-shadow: 0 0 0 3px rgba(239, 127, 162, 0.5) inset; }
    .hand-title { font-size: 13px; font-weight: 800; margin-bottom: 6px; }
    .hand { display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; min-height: 102px; }
    .card {
      width: calc(20% - 5px);
      min-width: 56px;
      height: 42px;
      background: #fff;
      border: 2px solid #fff;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
    }
    .card.selected { box-shadow: 0 0 0 3px rgba(255, 143, 194, 0.65) inset; transform: translateY(-1px); }
    .history { font-size: 12px; font-weight: 700; color: #8b7486; text-align: center; }
    .prize-log-title { font-size: 12px; font-weight: 800; margin-bottom: 6px; color: #7e6678; }
    .prize-log {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 24px;
    }
    .prize-chip {
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      border: 1px solid #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.4;
    }
    .prize-chip.plus { color: var(--ok); }
    .prize-chip.minus { color: var(--warn); }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="title">ハゲタカのえじき風（あなた + NPC3人）</div>
      <div class="row">
        <div class="chip" id="roundInfo">ラウンド: 1 / 15</div>
        <div class="chip" id="deckInfo">残り得点札: 15</div>
      </div>
    </div>

    <div class="panel scores" id="scores"></div>

    <div class="panel prize-wrap">
      <div class="prize plus" id="prizeBox">
        <div>今回の得点札（持ち越し込み）</div>
        <div class="value" id="prizeValue">+0</div>
      </div>
      <div class="row">
        <button id="playBtn">このカードで勝負</button>
        <button class="secondary" id="newBtn">新しく開始</button>
      </div>
    </div>

    <div class="panel msg" id="message"></div>

    <div class="panel">
      <div class="reveal-title">中央公開（このラウンドの出札）</div>
      <div class="reveal-grid" id="revealGrid"></div>
    </div>

    <div class="panel">
      <div class="hand-title">あなたの手札（1枚選んで勝負）</div>
      <div class="hand" id="hand"></div>
    </div>

    <div class="panel">
      <div class="history" id="history">まだ勝負していません。</div>
      <div class="prize-log-title">出た得点札</div>
      <div class="prize-log" id="prizeLog"></div>
    </div>
  </div>

  <script>
    (() => {
      const state = {
        prizeDeck: [],
        players: [],
        round: 1,
        currentPrize: 0,
        carry: 0,
        selectedCard: null,
        gameOver: false,
        lastBids: [],
        tieCards: new Set(),
        lastWinner: null,
        drawnPrizes: [],
      };

      const el = {
        roundInfo: document.getElementById("roundInfo"),
        deckInfo: document.getElementById("deckInfo"),
        scores: document.getElementById("scores"),
        prizeBox: document.getElementById("prizeBox"),
        prizeValue: document.getElementById("prizeValue"),
        playBtn: document.getElementById("playBtn"),
        newBtn: document.getElementById("newBtn"),
        message: document.getElementById("message"),
        revealGrid: document.getElementById("revealGrid"),
        hand: document.getElementById("hand"),
        history: document.getElementById("history"),
        prizeLog: document.getElementById("prizeLog"),
      };

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
      }

      function setupPrizeDeck() {
        const cards = [];
        for (let i = -5; i <= -1; i += 1) cards.push(i);
        for (let i = 1; i <= 10; i += 1) cards.push(i);
        shuffle(cards);
        return cards;
      }

      function setMessage(text, good = false, bad = false) {
        el.message.textContent = text;
        el.message.style.color = bad ? "var(--warn)" : (good ? "var(--ok)" : "var(--ink)");
      }

      function scoreColor(score) {
        if (score > 0) return "var(--ok)";
        if (score < 0) return "var(--warn)";
        return "var(--ink)";
      }

      function renderScores() {
        el.scores.innerHTML = "";
        for (let i = 0; i < state.players.length; i += 1) {
          const p = state.players[i];
          const div = document.createElement("div");
          div.className = "score-item" + (i === 0 ? " you" : "");
          div.innerHTML = "<span>" + p.name + "</span><span style='color:" + scoreColor(p.score) + "'>" + p.score + "</span>";
          el.scores.appendChild(div);
        }
      }

      function renderPrize() {
        const v = state.currentPrize;
        el.prizeValue.textContent = (v > 0 ? "+" : "") + v;
        el.prizeBox.className = "prize " + (v >= 0 ? "plus" : "minus");
      }

      function renderReveal() {
        el.revealGrid.innerHTML = "";
        for (let i = 0; i < state.players.length; i += 1) {
          const p = state.players[i];
          const bid = state.lastBids.find((b) => b.player === i);
          const card = bid ? bid.card : "？";
          const div = document.createElement("div");
          let klass = "reveal-card";
          if (bid && state.lastWinner != null && state.lastWinner === i) klass += " win";
          if (bid && state.tieCards.has(card)) klass += " tie";
          div.className = klass;
          div.innerHTML = "<div class='name'>" + p.name + "</div><div class='num'>" + card + "</div>";
          el.revealGrid.appendChild(div);
        }
      }

      function renderHand() {
        const you = state.players[0];
        el.hand.innerHTML = "";
        for (let i = 0; i < you.hand.length; i += 1) {
          const card = you.hand[i];
          const btn = document.createElement("button");
          btn.className = "card" + (state.selectedCard === card ? " selected" : "");
          btn.textContent = String(card);
          btn.onclick = () => {
            if (state.gameOver) return;
            state.selectedCard = state.selectedCard === card ? null : card;
            render();
          };
          el.hand.appendChild(btn);
        }
      }

      function renderPrizeLog() {
        el.prizeLog.innerHTML = "";
        for (let i = 0; i < state.drawnPrizes.length; i += 1) {
          const v = state.drawnPrizes[i];
          const chip = document.createElement("div");
          chip.className = "prize-chip " + (v >= 0 ? "plus" : "minus");
          chip.textContent = (v > 0 ? "+" : "") + v;
          el.prizeLog.appendChild(chip);
        }
      }

      function render() {
        el.roundInfo.textContent = "ラウンド: " + state.round + " / 15";
        el.deckInfo.textContent = "残り得点札: " + state.prizeDeck.length;
        el.playBtn.disabled = state.gameOver || state.selectedCard == null;
        renderScores();
        renderPrize();
        renderReveal();
        renderHand();
        renderPrizeLog();
      }

      function takeCardFromHand(player, card) {
        const idx = player.hand.indexOf(card);
        if (idx >= 0) player.hand.splice(idx, 1);
      }

      function npcChooseCard(npc, prize, takenCards) {
        const hand = npc.hand.slice().sort((a, b) => a - b);
        let target;
        if (prize > 0) {
          if (prize >= 9) target = 14;
          else if (prize >= 6) target = 11;
          else if (prize >= 3) target = 8;
          else target = 5;
        } else {
          if (prize <= -5) target = 2;
          else if (prize <= -3) target = 4;
          else target = 7;
        }
        target += npc.bias;

        let best = hand[0];
        let bestScore = Number.POSITIVE_INFINITY;
        for (let i = 0; i < hand.length; i += 1) {
          const c = hand[i];
          let score = Math.abs(c - target);
          if (takenCards.has(c)) score += 3.5;
          score += Math.random() * 0.9;
          if (score < bestScore) {
            bestScore = score;
            best = c;
          }
        }
        return best;
      }

      function resolveRound(bids) {
        const prize = state.currentPrize;
        const counts = {};
        for (let i = 0; i < bids.length; i += 1) {
          const b = bids[i].card;
          counts[b] = (counts[b] || 0) + 1;
        }
        const unique = bids.filter((b) => counts[b.card] === 1);
        state.tieCards = new Set(Object.keys(counts).filter((k) => counts[k] > 1).map((k) => Number(k)));
        if (unique.length === 0) {
          state.carry = prize;
          setMessage("同値で相殺。得点札 " + (prize > 0 ? "+" : "") + prize + " は次へ持ち越し。");
          return { winner: null, bids };
        }

        let winner = unique[0];
        for (let i = 1; i < unique.length; i += 1) {
          if (prize >= 0) {
            if (unique[i].card > winner.card) winner = unique[i];
          } else if (unique[i].card < winner.card) winner = unique[i];
        }

        state.carry = 0;
        state.players[winner.player].score += prize;
        const wName = state.players[winner.player].name;
        setMessage(wName + " が " + (prize > 0 ? "+" : "") + prize + " を獲得。", true, false);
        return { winner, bids };
      }

      function nextPrizeOrEnd() {
        if (state.prizeDeck.length === 0) {
          state.gameOver = true;
          const sorted = state.players
            .map((p, i) => ({ ...p, idx: i }))
            .sort((a, b) => b.score - a.score);
          if (sorted[0].idx === 0) {
            setMessage("ゲーム終了。あなたの勝ち！", true, false);
          } else {
            setMessage("ゲーム終了。勝者は " + sorted[0].name + "。", false, true);
          }
          return;
        }
        const card = state.prizeDeck.pop();
        state.drawnPrizes.push(card);
        state.currentPrize = card + state.carry;
      }

      function playRound() {
        if (state.gameOver || state.selectedCard == null) return;
        const bids = [];
        const takenCards = new Set();

        const you = state.players[0];
        const yourCard = state.selectedCard;
        takeCardFromHand(you, yourCard);
        bids.push({ player: 0, card: yourCard });
        takenCards.add(yourCard);

        for (let i = 1; i < state.players.length; i += 1) {
          const npc = state.players[i];
          const c = npcChooseCard(npc, state.currentPrize, takenCards);
          takeCardFromHand(npc, c);
          bids.push({ player: i, card: c });
          takenCards.add(c);
        }

        const result = resolveRound(bids);
        state.lastBids = bids.slice();
        state.lastWinner = result.winner ? result.winner.player : null;

        const log = bids.map((b) => state.players[b.player].name + ":" + b.card).join(" / ");
        if (result.winner) {
          const w = state.players[result.winner.player].name;
          el.history.textContent = "公開: " + log + " ｜ 勝者: " + w;
        } else {
          el.history.textContent = "公開: " + log + " ｜ 勝者なし（持ち越し）";
        }

        state.selectedCard = null;
        state.round += 1;
        nextPrizeOrEnd();
        render();
      }

      function newGame() {
        state.prizeDeck = setupPrizeDeck();
        state.players = [
          { name: "あなた", hand: [], score: 0, bias: 0 },
          { name: "NPC1", hand: [], score: 0, bias: -1.1 },
          { name: "NPC2", hand: [], score: 0, bias: 0.8 },
          { name: "NPC3", hand: [], score: 0, bias: 1.7 },
        ];
        for (let n = 1; n <= 15; n += 1) {
          for (let i = 0; i < state.players.length; i += 1) state.players[i].hand.push(n);
        }
        state.round = 1;
        state.selectedCard = null;
        state.carry = 0;
        state.currentPrize = 0;
        state.gameOver = false;
        state.lastBids = [];
        state.tieCards = new Set();
        state.lastWinner = null;
        state.drawnPrizes = [];
        el.history.textContent = "まだ勝負していません。";
        nextPrizeOrEnd();
        setMessage("ゲーム開始。手札を1枚選んで勝負してください。");
        render();
      }

      el.playBtn.addEventListener("click", playRound);
      el.newBtn.addEventListener("click", newGame);
      newGame();
    })();
  </script>
</body>
</html>
